<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KFZ Mechatroniker Prüfungstrainer V10</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; font-size: 18px; color: var(--primary); }
        .container { max-width: 550px; margin: auto; padding: 15px; min-height: 85vh; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-top: 10px; }
        select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; margin: 20px 0; background: #fff; }
        .btn-main { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .btn-main:disabled { background: #a2a2a7; }
        .quiz-screen { display: none; }
        .progress-bar { height: 6px; background: #e5e5ea; border-radius: 3px; margin-bottom: 20px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .q-text { font-size: 18px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .opt-row { display: flex; align-items: center; background: #fff; border: 2px solid #e5e5ea; border-radius: 14px; padding: 15px; cursor: pointer; transition: 0.2s; }
        .opt-row.selected { border-color: var(--primary); background: #f0f7ff; }
        .opt-letter { width: 30px; height: 30px; background: #f2f2f7; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 15px; color: var(--primary); }
        .opt-row.selected .opt-letter { background: var(--primary); color: #fff; }
        .next-btn { width: 100%; background: #1c1c1e; color: #fff; border: none; padding: 18px; border-radius: 14px; font-weight: 600; margin-top: 25px; display: none; cursor: pointer; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-screen { display: none; text-align: center; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; margin: 20px auto; color: #fff; background: var(--primary); }
    </style>
</head>
<body>

<div class="header"><h1>KFZ Gesellenprüfung Trainer</h1></div>

<div class="container">
    <div id="setup" class="card">
        <h2 style="margin-top:0;">Prüfungsbereich wählen</h2>
        <p>Simulation der offiziellen Prüfungsfragen für LF5 und LF6.</p>
        <select id="lfSelect">
            <option value="LF5: Kurbeltrieb, Zylinderkopf, Schmierung, Kühlung, Variable Motorsteuerung (Valvetronic), Turbolader (VTG/Wastegate)">LF5: Motorinstandsetzung & Steuerung</option>
            <option value="LF6: Batteriemanagement, Ruhestrom, Start-Stopp, Hochvolt (HV), 48V-Bordnetz (BMW 530d), Brennstoffzelle">LF6: Diagnose & HV-Systeme</option>
            <option value="LF5 & LF6: Gesamte Themen von Zylinderverschleiß bis Isolationsprüfung">LF5 & LF6: Kompletter Mix</option>
        </select>
        <button class="btn-main" onclick="startQuiz()">Prüfung starten</button>
        <div id="loader" class="loader"></div>
    </div>

    <div id="quiz" class="quiz-screen">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="q-container"></div>
        <button id="nextBtn" class="next-btn" onclick="nextQuestion()">Bestätigen & Weiter</button>
    </div>

    <div id="result" class="card result-screen">
        <h2>Prüfung beendet</h2>
        <div id="scoreCircle" class="score-circle">0%</div>
        <p id="scoreText"></p>
        <button class="btn-main" onclick="location.reload()">Neue Prüfung</button>
    </div>
</div>

<script>
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let selectedAnswer = null;

    async function startQuiz() {
        const lf = document.getElementById('lfSelect').value;
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        document.querySelector('.btn-main').disabled = true;

        const prompt = `Erstelle 10 professionelle KFZ-Mechatroniker Prüfungsfragen zu ${lf}. 
        Nutze Begriffe wie: Druckverlustprüfung, VTG-Lader, Valvetronic, Ruhestrom (Datenbus), 48V-Lithium-Batterie, Isolationsprüfung HV.
        WICHTIG: Erstelle NUR A, B, C, D Optionen.
        FORMAT: {"questions": [{"q": "Frage?", "options": ["A-Text", "B-Text", "C-Text", "D-Text"], "answer": "ExactCorrectText"}]}`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': 'Bearer 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' 
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.5,
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();
            questions = JSON.parse(data.choices[0].message.content).questions;
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            showQuestion();
        } catch (e) {
            alert("Fehler beim Laden der Fragen.");
            location.reload();
        }
    }

    function showQuestion() {
        const q = questions[currentIndex];
        const container = document.getElementById('q-container');
        document.getElementById('progress-fill').style.width = ((currentIndex + 1) / questions.length * 100) + '%';
        document.getElementById('nextBtn').style.display = 'none';
        selectedAnswer = null;

        const letters = ['A', 'B', 'C', 'D'];
        container.innerHTML = `
            <div style="font-size:12px; color:#8e8e93; font-weight:700; margin-bottom:10px;">FRAGE ${currentIndex+1} VON ${questions.length}</div>
            <div class="q-text">${q.q}</div>
            <div class="options-list">
                ${q.options.map((opt, i) => `
                    <div class="opt-row" onclick="selectOpt(this, '${opt.replace(/'/g,"\\'")}')">
                        <div class="opt-letter">${letters[i]}</div>
                        <div style="flex:1;">${opt}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function selectOpt(el, val) {
        document.querySelectorAll('.opt-row').forEach(r => r.classList.remove('selected'));
        el.classList.add('selected');
        selectedAnswer = val;
        document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQuestion() {
        if (selectedAnswer === questions[currentIndex].answer) score++;
        currentIndex++;
        if (currentIndex < questions.length) showQuestion();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        const p = Math.round((score / questions.length) * 100);
        document.getElementById('scoreCircle').innerText = p + "%";
        document.getElementById('scoreText').innerText = `Du hast ${score} von ${questions.length} Fragen richtig beantwortet.`;
        if (p < 50) document.getElementById('scoreCircle').style.background = '#ff3b30';
    }
</script>

</body>
</html>
