<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kfz-Technik Academy Pro</title>
  <style>
    :root { 
      --primary: #1a73e8; --success: #34a853; --error: #ea4335; 
      --bg: #f8f9fa; --card: #ffffff; --text: #202124; --secondary: #5f6368;
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; direction: ltr; }
    body.ar { direction: rtl; }
    .container { max-width: 650px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-bottom: 20px; border-bottom: 2px solid #eee; }
    .logo { font-weight: 900; font-size: 20px; color: var(--primary); letter-spacing: 1px; }
    .btn-lang { background: var(--card); border: 1.5px solid #dadce0; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .screen { display: none; animation: fadeIn 0.3s ease; }
    .active { display: block; }
    .card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
    h1 { font-size: 22px; text-align: center; margin: 0 0 10px 0; }
    .subtitle { text-align: center; color: var(--secondary); margin-bottom: 25px; font-size: 14px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .category-btn { background: #fff; border: 1.5px solid #e8eaed; padding: 14px 10px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }
    .category-btn:hover { border-color: var(--primary); color: var(--primary); background: #f8faff; }
    .exam-btn { grid-column: span 2; background: var(--primary) !important; color: white !important; border: none; margin-top: 10px; padding: 18px; font-size: 16px; }
    #counter { font-size: 13px; color: var(--secondary); margin-bottom: 10px; font-weight: bold; display: flex; justify-content: space-between; }
    .question-text { font-size: 18px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; }
    .hint { font-size: 11px; color: var(--primary); background: #e8f0fe; padding: 4px 10px; border-radius: 6px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
    .answers-list { display: flex; flex-direction: column; gap: 10px; }
    .answer-item { display: flex; align-items: center; padding: 15px; border: 1.5px solid #dadce0; border-radius: 12px; cursor: pointer; font-size: 15px; transition: 0.2s; }
    .answer-item:hover { border-color: var(--primary); background: #fbfcfe; }
    .answer-item input { margin: 0 12px; width: 18px; height: 18px; cursor: pointer; }
    .rf-row { padding: 12px; border: 1.5px solid #dadce0; border-radius: 12px; margin-bottom: 10px; }
    .rf-options { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end; }
    .rf-btn { width: 55px; height: 45px; border: 1.5px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; background: #fff; }
    .selected-r { background: var(--success) !important; color: white; border-color: var(--success) !important; }
    .selected-f { background: var(--error) !important; color: white; border-color: var(--error) !important; }
    .correct { background: #e6f4ea !important; border-color: var(--success) !important; color: #137333; font-weight: bold; }
    .wrong { background: #fce8e6 !important; border-color: var(--error) !important; color: #c5221f; }
    .disabled { pointer-events: none; opacity: 0.8; }
    .nav-btns { margin-top: 25px; display: flex; gap: 10px; }
    .main-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .primary-btn { background: var(--primary); color: white; }
    .primary-btn:hover { background: #1557b0; }
    .back-btn { background: #f1f3f4; color: var(--text); }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; margin: 20px auto; color: var(--primary); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">KFZ-TECH</div>
    <button class="btn-lang" onclick="toggleLanguage()" id="langBtn">العربية</button>
  </header>

  <div id="home-screen" class="screen active">
    <div class="card">
      <h1 id="ui-welcome">Willkommen</h1>
      <p class="subtitle" id="ui-sub">Lerne nach Kategorien oder starte die Prüfung</p>
      <div class="menu-grid" id="categoryMenu"></div>
      <button class="category-btn exam-btn" onclick="startQuiz('all', true)" id="ui-exam-btn"></button>
    </div>
  </div>

  <div id="quiz-screen" class="screen">
    <div id="counter"></div>
    <div class="card">
      <div id="ui-hint" class="hint"></div>
      <div id="questionText" class="question-text"></div>
      <div id="answersContainer" class="answers-list"></div>
      <div class="nav-btns">
        <button class="main-btn back-btn" onclick="exitToHome()" id="ui-exit"></button>
        <button class="main-btn primary-btn" id="nextBtn" onclick="goToNext()" style="display: none;"></button>
      </div>
    </div>
  </div>

  <div id="result-screen" class="screen">
    <div class="card" style="text-align: center;">
      <h2 id="ui-result-title"></h2>
      <div class="score-circle" id="scoreDisplay"></div>
      <p id="ui-feedback" style="font-weight: bold;"></p>
      <button class="main-btn primary-btn" onclick="exitToHome()" id="ui-restart"></button>
    </div>
  </div>
</div>

  { cat: 'pneumatik', q_de: "Kolbenrückstellung im Bremssattel?", q_ar: "أي قطعة تسبب عودة المكبس عند تحرير الفرامل؟", type: "single", a_de: ["Schutzmanschette", "der Rechteckring", "Bolzenführung", "Rückstellfeder"], a_ar: ["الغطاء الواقي", "الحلقة المستطيلة", "دليل المسمار", "نابض الإرجاع"], correct: [1] },
  { cat: 'pneumatik', q_de: "Anschlüsse Zweidruckventil?", q_ar: "كم عدد توصيلات صمام الضغط المزدوج؟", type: "single", a_de: ["2", "3", "4", "1"], a_ar: ["2", "3", "4", "1"], correct: [1] },
  { cat: 'pneumatik', q_de: "Rückschlagventile verfügen über...", q_ar: "صمامات عدم الرجوع تمتلك...", type: "single", a_de: ["1 Sperr- و 1 Durchflussrichtung", "2 Sperrrichtungen", "2 Durchflussrichtungen", "2 Sperr و 1 Durchfluss"], a_ar: ["اتجاه غلق وواحد تدفق", "اتجاهي غلق", "اتجاهي تدفق", "اتجاهي غلق وواحد تدفق"], correct: [0] }
];

// وظائف التحكم بالموقع
function toggleLanguage() {
  currentLang = (currentLang === 'de') ? 'ar' : 'de';
  document.body.className = (currentLang === 'ar') ? 'ar' : '';
  renderDashboard();
  renderUI();
}

function renderDashboard() {
  const menu = document.getElementById("categoryMenu");
  const cats = categories[currentLang];
  menu.innerHTML = "";
  Object.keys(cats).forEach(key => {
    const btn = document.createElement("button");
    btn.className = "category-btn";
    btn.textContent = cats[key];
    btn.onclick = () => startQuiz(key, false);
    menu.appendChild(btn);
  });
}

function renderUI() {
  const t = ui[currentLang];
  document.getElementById("langBtn").textContent = t.lang;
  document.getElementById("ui-welcome").textContent = t.welcome;
  document.getElementById("ui-sub").textContent = t.sub;
  document.getElementById("ui-exam-btn").textContent = t.exam;
  document.getElementById("ui-restart").textContent = t.restart;
  document.getElementById("ui-result-title").textContent = t.result;
  document.getElementById("ui-exit").textContent = t.exit;
}

function startQuiz(catKey, fullExam) {
  isExamMode = fullExam;
  score = 0;
  currentIndex = 0;
  if (catKey === 'all') {
    quizQuestions = [...allQuestions].sort(() => Math.random() - 0.5);
  } else {
    quizQuestions = allQuestions.filter(q => q.cat === catKey).sort(() => Math.random() - 0.5);
  }
  showScreen("quiz-screen");
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[currentIndex];
  const t = ui[currentLang];
  const container = document.getElementById("answersContainer");
  const nextBtn = document.getElementById("nextBtn");
  
  document.getElementById("counter").innerHTML = `<span>${t.q} ${currentIndex + 1} / ${quizQuestions.length}</span> <span style="color:var(--primary)">${categories[currentLang][q.cat] || ""}</span>`;
  document.getElementById("questionText").textContent = (currentLang === 'de' ? q.q_de : q.q_ar);
  
  let hint = "";
  if(q.type === 'single') hint = t.hintSingle;
  else if(q.type === 'multi') hint = t.hintMulti;
  else if(q.type === 'truth') hint = t.hintRF;
  document.getElementById("ui-hint").textContent = hint;

  container.innerHTML = "";
  nextBtn.style.display = "none";
  userSelections = [];

  const options = (currentLang === 'de' ? q.a_de : q.a_ar);

  options.forEach((optText, i) => {
    if (q.type === 'truth') {
      const row = document.createElement("div");
      row.className = "rf-row";
      row.innerHTML = `<div>${optText}</div><div class="rf-options"><div class="rf-btn" id="r-${i}" onclick="handleRF(${i}, 'R')">R</div><div class="rf-btn" id="f-${i}" onclick="handleRF(${i}, 'F')">F</div></div>`;
      container.appendChild(row);
    } else {
      const label = document.createElement("label");
      label.className = "answer-item";
      label.innerHTML = `<input type="${q.type==='single'?'radio':'checkbox'}" name="ans" value="${i}" onchange="handleInput()"> ${optText}`;
      container.appendChild(label);
    }
  });
}

function handleInput() {
  const q = quizQuestions[currentIndex];
  const selected = Array.from(document.querySelectorAll('input:checked')).map(el => parseInt(el.value));
  if (isExamMode) {
    document.getElementById("nextBtn").style.display = "block";
    document.getElementById("nextBtn").textContent = ui[currentLang].next;
  } else {
    if(q.type === 'single') validateChoice(selected);
    else if(q.type === 'multi' && selected.length === q.correct.length) validateChoice(selected);
  }
}

function handleRF(rowIndex, choice) {
  userSelections[rowIndex] = choice;
  document.getElementById(`r-${rowIndex}`).classList.remove('selected-r');
  document.getElementById(`f-${rowIndex}`).classList.remove('selected-f');
  if(choice === 'R') document.getElementById(`r-${rowIndex}`).classList.add('selected-r');
  else document.getElementById(`f-${rowIndex}`).classList.add('selected-f');

  if(userSelections.filter(x => x).length === quizQuestions[currentIndex].a_de.length) {
    if(isExamMode) {
        document.getElementById("nextBtn").style.display = "block";
        document.getElementById("nextBtn").textContent = ui[currentLang].next;
    } else {
        validateRF();
    }
  }
}

function validateChoice(selected) {
  const q = quizQuestions[currentIndex];
  const isCorrect = selected.length === q.correct.length && selected.every(v => q.correct.includes(v));
  if(isCorrect) score++;
  document.querySelectorAll('.answer-item').forEach((item, i) => {
    item.classList.add('disabled');
    if(q.correct.includes(i)) item.classList.add('correct');
    else if(selected.includes(i)) item.classList.add('wrong');
  });
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("nextBtn").textContent = ui[currentLang].next;
}

function validateRF() {
  const q = quizQuestions[currentIndex];
  let allCorrect = true;
  userSelections.forEach((choice, i) => {
    const row = document.querySelectorAll('.rf-row')[i];
    if(choice !== q.correct[i]) { allCorrect = false; row.classList.add('wrong'); }
    else row.classList.add('correct');
    row.classList.add('disabled');
  });
  if(allCorrect) score++;
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("nextBtn").textContent = ui[currentLang].next;
}

function goToNext() {
  if (isExamMode) calculateExamScore();
  currentIndex++;
  if(currentIndex < quizQuestions.length) renderQuestion();
  else showResults();
}

function calculateExamScore() {
  const q = quizQuestions[currentIndex];
  if(q.type === 'truth') {
    if(userSelections.every((choice, i) => choice === q.correct[i])) score++;
  } else {
    const selected = Array.from(document.querySelectorAll('input:checked')).map(el => parseInt(el.value));
    if(selected.length === q.correct.length && selected.every(v => q.correct.includes(v))) score++;
  }
}

function showResults() {
  showScreen("result-screen");
  const percent = Math.round((score/quizQuestions.length)*100);
  document.getElementById("scoreDisplay").textContent = `${score}/${quizQuestions.length}`;
  document.getElementById("ui-feedback").textContent = percent > 50 ? (currentLang==='ar'?"عمل رائع! استمر في التعلم.":"Tolle Leistung! Weiter so.") : (currentLang==='ar'?"تحتاج لمزيد من الممارسة.":"Du solltest noch etwas üben.");
}

function exitToHome() { showScreen("home-screen"); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

renderDashboard();
renderUI();
</script>
</body>
</html>
