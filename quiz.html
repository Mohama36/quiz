<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technische Lernfragen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
    }
    .question {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .answers label {
      display: block;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
    }
    .answers input {
      margin-right: 10px;
    }
    .correct {
      background-color: #d4edda;
      border-color: #28a745;
    }
    .wrong {
      background-color: #f8d7da;
      border-color: #dc3545;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }
    button:disabled {
      background: #aaa;
    }

    /* R/F buttons */
    .tf-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .tf-text {
      flex: 1;
      margin-right: 10px;
    }
    .tf-btn {
      width: 45px;
      height: 35px;
      margin-left: 5px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Technische Lernfragen</h1>
    <div id="counter" style="text-align:right;font-weight:bold;margin-bottom:10px;"></div>
    <div id="quiz">
      <div class="question" id="question"></div>
      <div class="answers" id="answers"></div>
      <button id="nextBtn" disabled>Nächste Frage</button>
      <button id="restartBtn" style="margin-left:10px;background:#28a745;">Neustart (neu mischen)</button>
    </div>
    <div id="result" style="display:none;"></div>
  </div>

  <script>
    const questions = [
      {
        q: "Wie bereitest du eine Klebeverbindung fachgerecht vor?",
        a: [
          "Du musst die Klebeflächen absolut eben schleifen.",
          "Du musst nichts vorbereiten, moderne Klebstoffe gleichen Unebenheiten und Verunreinigungen von selbst aus.",
          "Du musst die Klebeflächen metallisch blank schleifen oder die KTL-Grundierung des Ersatzteils anschleifen bzw. reinigen.",
          "Du musst punktschweistarbe oder Glasprime auftragen"
        ],
        correct: [0, 2],
        explain: "Die richtige Vorbereitung ist: absolut eben schleifen und metallisch blank bzw. KTL-Grundierung anschleifen/ reinigen.",
        type: "mc"
      },
      {
        q: "Was verstehst du unter der „Fügezeit\" eines Klebers?",
        a: [
          "Die Zeit, innerhalb der der Kleber vollstandig aushartet.",
          "Die Zeit, nach der sich der Kleber verflüssigt, wenn er nicht in den Trocknungsofen kommt.",
          "Die Zeit, innerhalb der der Kleber mit Wasser benetzt werden muss.",
          "Die Zeit, innerhalb der alle Anpassarbeiten abgeschlossen sein müssen."
        ],
        correct: [3],
        explain: "Fügezeit = Zeit, innerhalb der alle Anpassarbeiten abgeschlossen sein müssen.",
        type: "mc"
      },
      {
        q: "Welche übergeordneten Material-eigenschaften müssen trotz Wärmezufuhr beim Fügen (Schweißen) von Karosserie-bauteilen erhalten bleiben?",
        a: [
          "Korrosionsschutz und Flexibilitat",
          "Flexibilität und Magnetismus",
          "Festigkeit und Korrosionsschutz",
          "Lackierbarkeit und Rostfreiheit"
        ],
        correct: [2],
        explain: "Festigkeit und Korrosionsschutz müssen erhalten bleiben.",
        type: "mc"
      },
      {
        q: "Wofür steht das „M\" in der Schrauben-bezeichnung M 12x - -10.9?",
        a: [
          "Für Metallschraube.",
          "Für metrisches ISO-Gewinde.",
          "Für Mindestzugfestigkeit 12 Nm.",
          "Für maximales Drehmoment 120 Nm."
        ],
        correct: [1],
        explain: "M steht für metrisches ISO-Gewinde.",
        type: "mc"
      },
      {
        q: "Welche zwei Werte werden verschlüsselt auf den Schraubenkopf aufgebracht?",
        a: [
          "Die Streckgrenze",
          "Die Zugfestigkeit.",
          "Die Gewindeart.",
          "Die Gewindebezeichnung."
        ],
        correct: [0, 1],
        explain: "Auf dem Schraubenkopf stehen Streckgrenze und Zugfestigkeit.",
        type: "mc"
      },
      {
        q: "Es gibt verschiedene Varianten von Mess-schrauben. Entscheide, welche davon im Kfz-Bereich zum Einsatz kommen. Setze R für richtig und F für falsch ein.",
        type: "tf",
        items: [
          { text: "Bügelmessschrauben", correct: true },
          { text: "Einbaumessschrauben", correct: false },
          { text: "Innenmessschrauben", correct: true },
          { text: "Tiefenmessschrauben", correct: false },
          { text: "Winkelmessschrauben", correct: false }
        ],
        explain: "Im Kfz-Bereich kommen Bügelmessschrauben und Innenmessschrauben zum Einsatz."
      },
      {
        q: "Mit welcher Genauigkeit lassen sich Längenmaße mit dem Universalmessschieber ermitteln?",
        a: [
          "0,1 Millimeter",
          "0,01 Millimeter",
          "0,001 Millimeter",
          "0,05 Millimeter"
        ],
        correct: [0, 3],
        explain: "Mit dem Universalmessschieber sind 0,1 mm und 0,05 mm Genauigkeit üblich (je nach Modell).",
        type: "mc"
      }
    ];

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function shuffleQuiz() {
      shuffleArray(questions);
      questions.forEach(q => {
        if (q.type === "mc") {
          const pairs = q.a.map((text, idx) => ({ text, idx }));
          shuffleArray(pairs);
          q.a = pairs.map(p => p.text);
          const newCorrect = [];
          pairs.forEach((p, newIdx) => {
            if (q.correct.includes(p.idx)) newCorrect.push(newIdx);
          });
          q.correct = newCorrect;
        }
      });
    }

    shuffleQuiz();

    let index = 0;
    let score = 0;
    let answered = false; // منع التكرار

    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const resultEl = document.getElementById("result");
    const quizEl = document.getElementById("quiz");

    function loadQuestion() {
      document.getElementById("counter").textContent = `Frage ${index + 1} von ${questions.length}`;
      nextBtn.disabled = true;
      answered = false; // reset
      answersEl.innerHTML = "";
      const q = questions[index];
      questionEl.textContent = q.q;

      if (q.type === "tf") {
        const list = document.createElement("div");
        list.className = "tf-list";

        q.items.forEach((item, i) => {
          const row = document.createElement("div");
          row.className = "tf-row";

          const text = document.createElement("div");
          text.className = "tf-text";
          text.textContent = item.text;

          const btnR = document.createElement("button");
          btnR.textContent = "R";
          btnR.className = "tf-btn";
          btnR.onclick = () => checkTF(i, true, row);

          const btnF = document.createElement("button");
          btnF.textContent = "F";
          btnF.className = "tf-btn";
          btnF.onclick = () => checkTF(i, false, row);

          row.appendChild(text);
          row.appendChild(btnR);
          row.appendChild(btnF);
          list.appendChild(row);
        });

        answersEl.appendChild(list);
      } else {
        q.a.forEach((text, i) => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = q.correct.length > 1 ? "checkbox" : "radio";
          input.name = "answer";
          input.onclick = () => checkAnswer(i, label);
          label.appendChild(input);
          label.appendChild(document.createTextNode(text));
          answersEl.appendChild(label);
        });
      }
    }

    function checkTF(itemIndex, chosenValue, row) {
      const q = questions[index];
      const item = q.items[itemIndex];

      row.querySelectorAll("button").forEach(b => b.disabled = true);

      const correct = item.correct === chosenValue;
      row.classList.add(correct ? "correct" : "wrong");

      if (correct) score++;

      const answeredAll = Array.from(answersEl.querySelectorAll(".tf-row")).every(r => r.classList.contains("correct") || r.classList.contains("wrong"));
      if (answeredAll) {
        const explain = document.createElement("div");
        explain.style.marginTop = "10px";
        explain.textContent = "Erklärung: " + q.explain;
        answersEl.appendChild(explain);
        nextBtn.disabled = false;
      }
    }

    function checkAnswer(selected, label) {
      if (answered) return; // منع التكرار
      answered = true;

      const q = questions[index];
      const labels = answersEl.querySelectorAll("label");
      const inputs = answersEl.querySelectorAll("input");

      if (q.correct.length > 1) {
        let chosen = [];
        inputs.forEach((inp, i) => { if (inp.checked) chosen.push(i); });
        if (chosen.length < q.correct.length) {
          answered = false;
          return;
        }

        const isCorrect = chosen.length === q.correct.length && chosen.every(v => q.correct.includes(v));
        labels.forEach((l, i) => {
          if (q.correct.includes(i)) l.classList.add("correct");
          else if (chosen.includes(i)) l.classList.add("wrong");
        });
        if (isCorrect) score++;
      } else {
        if (selected === q.correct[0]) {
          label.classList.add("correct");
          score++;
        } else {
          label.classList.add("wrong");
          labels[q.correct[0]].classList.add("correct");
        }
      }

      const explain = document.createElement("div");
      explain.style.marginTop = "10px";
      explain.textContent = "Erklärung: " + q.explain;
      answersEl.appendChild(explain);

      nextBtn.disabled = false;
    }

    nextBtn.onclick = () => {
      index++;
      if (index < questions.length) {
        loadQuestion();
      } else {
        quizEl.style.display = "none";
        resultEl.style.display = "block";
        resultEl.innerHTML = `<h2>Ergebnis</h2><p>${score} von ${questions.length} richtig</p>`;
      }
    };

    restartBtn.onclick = () => {
      index = 0;
      score = 0;
      resultEl.style.display = "none";
      quizEl.style.display = "block";
      shuffleQuiz();
      loadQuestion();
    };

    loadQuestion();
  </script>
</body>
</html>
