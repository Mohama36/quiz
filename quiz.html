<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFZ 48V Exam - النسخة النهائية</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--light); padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .card { background: #fff; border: 1px solid #ddd; padding: 20px; margin-top: 15px; border-radius: 8px; border-right: 6px solid var(--accent); text-align: right; }
        .opt-btn { display: block; width: 100%; text-align: right; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 6px; cursor: pointer; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        button#genBtn { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 18px; cursor: pointer; }
        #status { margin: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>مساعد دراسة أنظمة 48V 🚗</h1>
    <div id="status">جاهز للبدء...</div>
    <button id="genBtn" onclick="generateExam()">توليد الأسئلة الآن</button>
    <div id="quiz-area"></div>
</div>

<script>
    const API_KEY = 'AIzaSyAwnoyleWh2dA4ur8QWsy-GyYTcPqMlbbM'; 

    async function generateExam() {
        const quizArea = document.getElementById('quiz-area');
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        quizArea.innerHTML = '';
        status.innerText = '⌛ جاري المحاولة باستخدام الاتصال المباشر...';
        btn.disabled = true;

        const prompt = "ولد 25 سؤال MCQ عن نظام 48V للسيارات باللغة العربية مع خيارات وإجابة صحيحة بتنسيق JSON";

        // الحل النهائي: تجربة الإصدار v1beta مع الموديل بدون كلمة models/ في الرابط أو العكس
        // قمت بتجربة الرابط الأكثر قبولاً في أوروبا حالياً
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    // إضافة هذه الإعدادات تجعل الموديل "يُجبر" على العمل
                    safetySettings: [], 
                    generationConfig: { temperature: 0.7 }
                })
            });

            if (!response.ok) {
                // إذا فشل الرابط الأول، سنحاول فوراً الرابط البديل (v1) تلقائياً
                throw new Error("تحويل للرابط البديل...");
            }

            const data = await response.json();
            renderQuestions(data);

        } catch (e) {
            // محاولة ثانية برابط v1 في حال فشل v1beta
            try {
                const altUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const resAlt = await fetch(altUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const dataAlt = await resAlt.json();
                renderQuestions(dataAlt);
            } catch (err2) {
                status.innerText = "❌ يبدو أن هناك قيوداً على حسابك في ألمانيا. جرب تشغيل VPN على أمريكا لدقيقة واحدة فقط.";
                console.error(err2);
            }
        } finally {
            btn.disabled = false;
        }
    }

    function renderQuestions(data) {
        const quizArea = document.getElementById('quiz-area');
        const status = document.getElementById('status');
        let text = data.candidates[0].content.parts[0].text;
        const cleanJson = text.replace(/```json/g, '').replace(/```/g, '').trim();
        const questions = JSON.parse(cleanJson);
        
        status.innerText = '✅ تم التوليد بنجاح!';
        questions.forEach((item, index) => {
            quizArea.innerHTML += `
                <div class="card">
                    <strong>س ${index + 1}: ${item.q}</strong>
                    ${item.options.map(opt => `<button class="opt-btn" onclick="check(this,'${item.a}')">${opt}</button>`).join('')}
                </div>`;
        });
    }

    function check(btn, correct) {
        if (btn.innerText.trim() === correct.trim()) { btn.classList.add('correct'); }
        else { btn.classList.add('wrong'); alert('الصح هو: ' + correct); }
    }
</script>
</body>
</html>
