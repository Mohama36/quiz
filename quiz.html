<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Technische Lernfragen</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 700px;
    margin: 40px auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  h1 {
    text-align: center;
    margin-bottom: 20px;
  }
  .question {
    font-size: 18px;
    margin-bottom: 15px;
  }
  .answers label {
    display: block;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .answers input {
    margin-right: 10px;
  }
  .btns {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
  }
  button {
    padding: 10px 20px;
    border: none;
    background: #333;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
  }
  button:disabled {
    background: #777;
    cursor: not-allowed;
  }
  .result {
    margin-top: 20px;
    padding: 10px;
    background: #e7f3ff;
    border: 1px solid #b6d4ff;
    border-radius: 5px;
    display: none;
  }
  .counter {
    text-align: right;
    font-weight: bold;
    margin-top: -10px;
  }
  .explain {
    margin-top: 15px;
    background: #fff3cd;
    padding: 10px;
    border: 1px solid #ffeeba;
    border-radius: 5px;
  }
  .tf-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }
  .tf-row span {
    margin-left: 10px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Technische Lernfragen</h1>
  <div class="counter" id="counter"></div>
  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>
  <div class="result" id="result"></div>

  <div class="btns">
    <button id="nextBtn" disabled>Nächste Frage</button>
    <button id="restartBtn">Neustart (neu mischen)</button>
  </div>
</div>

<script>
const questions = [
  // ========== existing questions ==========
  {
    q: "Das Gewinde eines Druckreglers einer Sauerstoffflasche ist schwergängig. Was tun?",
    type: "mcq",
    a: ["Mit der Gewindefeile nacharbeiten","Mit Fett einfetten","Den Ausbilder informieren","Rostlöser benutzen"],
    correct: [2],
    explain: "Sicherheitsrelevant – niemals selbst reparieren."
  },
  {
    q: "Aus welchen Materialien besteht Messing?",
    type: "mcq",
    a: ["Kupfer und Stahl","Zinn und Kupfer","Kupfer und Zink","Stahl und Aluminium"],
    correct: [2],
    explain: "Messing besteht aus Kupfer und Zink."
  },
  {
    q: "Welches Gas verwenden wir beim Schutzgasschweißen?",
    type: "mcq",
    a: ["Sauerstoff","Argon","CO2","Azetylen"],
    correct: [1],
    explain: "Beim Schutzgasschweißen wird meist Argon verwendet."
  },
  {
    q: "Was ist die Hauptaufgabe des Schutzgases?",
    type: "mcq",
    a: ["Die Schweißstelle vor atmosphärischen Einflüssen schützen","Schmutz von der Stelle wegpusten","Für Erfrischung sorgen","Brennbarkeit erhöhen"],
    correct: [0],
    explain: "Das Schutzgas schützt die Schweißstelle vor Oxidation."
  },
  {
    q: "Welcher Bohrer wird für Gewinde M8 verwendet?",
    type: "mcq",
    a: ["8,0 mm","6,5 mm","6,8 mm","7,8 mm"],
    correct: [1],
    explain: "Für M8 wird ein 6,5 mm Kernloch gebohrt."
  },
  {
    q: "Welches Werkzeug eignet sich zum Außengewindeschneiden?",
    type: "mcq",
    a: ["Kluppe","Kugelwindeisen","Schneideisenhalter","Radienlehre"],
    correct: [2],
    explain: "Mit dem Schneideisenhalter lässt sich das Gewinde schneiden."
  },
  {
    q: "Die Klemmbezeichnung 58R an einer Anhängersteckdose steht für?",
    type: "mcq",
    a: ["Bremsleuchte rechts","Schlusslicht rechts","Masse","Blinker rechts"],
    correct: [1],
    explain: "58R = Schlusslicht rechts."
  },
  {
    q: "Die Klemmbezeichnung 54 an einer Anhängersteckdose steht für?",
    type: "mcq",
    a: ["Bremsleuchte","Schlusslicht","Blinker links","Nebelschlussleuchte"],
    correct: [0],
    explain: "54 = Bremsleuchte."
  },
  {
    q: "Welches Element treibt die Nockenwelle nicht an?",
    type: "mcq",
    a: ["Zahnriemen","Keilriemen","Steuerkette","Keilrippenriemen"],
    correct: [1],
    explain: "Ein Keilriemen treibt keine Nockenwelle an."
  },
  {
    q: "Mit welchem Werkzeug prüft man den Verzug am Zylinderkopf?",
    type: "mcq",
    a: ["Feinmessuhr","Haarlineal","Winkelmesser","Parallelmaß"],
    correct: [1],
    explain: "Mit dem Haarlineal wird der Verzug geprüft."
  },
  {
    q: "Welches Werkzeug zum genauen Messen einer Kurbelwelle?",
    type: "mcq",
    a: ["Messschieber","Innenfeinmessgerät","Bügelmessschraube","Refraktometer"],
    correct: [2],
    explain: "Die Bügelmessschraube ist ideal zum genauen Messen."
  },
  {
    q: "Welche drei Winkel hat ein Ventil?",
    type: "mcq",
    a: ["15°, 45°, 75°","5°, 15°, 40°","70°, 75°, 110°","15°, 40°, 70°"],
    correct: [0],
    explain: "Standard-Ventilwinkel sind 15°, 45°, 75°."
  },
  {
    q: "Wie breit sollte der Ventilsitz ungefähr sein?",
    type: "mcq",
    a: ["1,8 cm","1,5 mm","4,2 cm","2,0 mm"],
    correct: [1],
    explain: "Ein Ventilsitz ist ca. 1,5 mm breit."
  },
  {
    q: "Welche Eigenschaft trifft auf einen Zahnriemen zu?",
    type: "mcq",
    a: ["Formschlüssig","Beständig gegen Feuchtigkeit","Geringe Zugfestigkeit","Kaum Längung"],
    correct: [0],
    explain: "Der Zahnriemen arbeitet formschlüssig."
  },
  {
    q: "Welches Bauteil sorgt für die Rückstellung des Bremszylinderkolbens?",
    type: "mcq",
    a: ["Staubmanschette","Rechteckring","Hauptbremszylinder","Bremsscheibe"],
    correct: [1],
    explain: "Der Rechteckring sorgt für Rückstellung."
  },
  {
    q: "Welche Fehler kann ein Kompressionstest zeigen?",
    type: "mcq",
    a: ["Defekte Kurbelwelle","Verbranntes Ventil","Verschlissener Kolben","Loch im Kolben"],
    correct: [1],
    explain: "Ein verbranntes Ventil zeigt typischerweise niedrige Kompression."
  },
  {
    q: "Beim Druckverlusttest: Ursache bei 90 % Verlust?",
    type: "mcq",
    a: ["Ventile falsch eingestellt","Ventil verbrannt","Kolben steht auf UT","Öleinfüllstutzen geöffnet"],
    correct: [1],
    explain: "Ein verbranntes Ventil kann hohen Verlust erzeugen."
  },
  {
    q: "Wie viele Nockenwellenumdrehungen beim Ventile einstellen (4-Zyl)?",
    type: "mcq",
    a: ["0,5","2","1","4"],
    correct: [1],
    explain: "Mindestens 2 Umdrehungen."
  },
  {
    q: "Ein Arbeitsspiel eines 8-Zylinders besteht aus...?",
    type: "mcq",
    a: ["360°","180°","720°","90°"],
    correct: [2],
    explain: "Ein kompletter Zyklus ist 720°."
  },
  {
    q: "Die Klemmbezeichnung 54g steht für?",
    type: "mcq",
    a: ["Bremsleuchte","Kennzeichenleuchte","Nebelleuchte","Rückfahrleuchte"],
    correct: [2],
    explain: "54g = Nebelleuchte."
  },
  {
    q: "Hohlventile werden gefüllt mit?",
    type: "mcq",
    a: ["Öl","Messing","Natrium","Blei"],
    correct: [2],
    explain: "Natrium dient der Wärmeabfuhr."
  },
  {
    q: "Kurbelwelle und Nockenwelle drehen sich im Verhältnis?",
    type: "mcq",
    a: ["2:1","1:1","1:2","3:1"],
    correct: [0],
    explain: "Die Nockenwelle dreht sich halb so oft wie die Kurbelwelle."
  },

  // ========== new questions ==========
  {
    q: "Wie bereitest du eine Klebeverbindung fachgerecht vor?",
    type: "mcq",
    a: [
      "Du musst die Klebeflächen absolut eben schleifen.",
      "Du musst nichts vorbereiten, moderne Klebstoffe gleichen Unebenheiten und Verunreinigungen von selbst aus.",
      "Du musst die Klebeflächen metallisch blank schleifen oder die KTL-Grundierung des Ersatzteils anschleifen bzw. reinigen.",
      "Du musst punktschweistarbe oder Glasprime auftragen"
    ],
    correct: [0,2],
    explain: "Richtig: Eben schleifen + metallisch blank schleifen/anschleifen."
  },
  {
    q: "Was verstehst du unter der „Fügezeit\" eines Klebers?",
    type: "mcq",
    a: [
      "Die Zeit, innerhalb der der Kleber vollstandig aushartet.",
      "Die Zeit, nach der sich der Kleber verflüssigt, wenn er nicht in den Trocknungsofen kommt.",
      "Die Zeit, innerhalb der der Kleber mit Wasser benetzt werden muss.",
      "Die Zeit, innerhalb der alle Anpassarbeiten abgeschlossen sein müssen."
    ],
    correct: [3],
    explain: "Fügezeit = Zeit, innerhalb der alle Anpassarbeiten abgeschlossen sein müssen."
  },
  {
    q: "Welche übergeordneten Material-eigenschaften müssen trotz Wärmezufuhr beim Fügen (Schweißen) erhalten bleiben?",
    type: "mcq",
    a: [
      "Korrosionsschutz und Flexibilitat",
      "Flexibilität und Magnetismus",
      "Festigkeit und Korrosionsschutz",
      "Lackierbarkeit und Rostfreiheit"
    ],
    correct: [2],
    explain: "Richtig: Festigkeit und Korrosionsschutz."
  },
  {
    q: "Wofür steht das „M\" in der Schrauben-bezeichnung M12x - -10.9?",
    type: "mcq",
    a: [
      "Für Metallschraube.",
      "Für metrisches ISO-Gewinde.",
      "Für Mindestzugfestigkeit 12 Nm.",
      "Für maximales Drehmoment 120 Nm."
    ],
    correct: [1],
    explain: "M steht für metrisches ISO-Gewinde."
  },
  {
    q: "Welche zwei Werte werden verschlüsselt auf den Schraubenkopf aufgebracht?",
    type: "mcq",
    a: [
      "Die Streckgrenze",
      "Die Zugfestigkeit.",
      "Die Gewindeart.",
      "Die Gewindebezeichnung."
    ],
    correct: [0,1],
    explain: "Richtig: Streckgrenze + Zugfestigkeit."
  },
  {
    q: "Es gibt verschiedene Varianten von Messschrauben. Entscheide, welche davon im Kfz-Bereich zum Einsatz kommen.",
    type: "tf",
    a: [
      { text: "Bügelmessschrauben", correct: true },
      { text: "Einbaumessschrauben", correct: false },
      { text: "Innenmessschrauben", correct: true },
      { text: "Tiefenmessschrauben", correct: false },
      { text: "Winkelmessschrauben", correct: false }
    ],
    explain: "Bügel- und Innenmessschrauben werden im KFZ-Bereich verwendet."
  },
  {
    q: "Mit welcher Genauigkeit lassen sich Längenmaße mit dem Universalmessschieber ermitteln?",
    type: "mcq",
    a: [
      "0,1 Millimeter",
      "0,01 Millimeter",
      "0,001 Millimeter",
      "0,05 Millimeter"
    ],
    correct: [0,3],
    explain: "Richtig: 0,1 mm و 0,05 mm."
  }
];

let index = 0;
let score = 0;
let shuffled = [];

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const resultEl = document.getElementById("result");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const counterEl = document.getElementById("counter");

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function startQuiz() {
  index = 0;
  score = 0;
  shuffled = [...questions];
  shuffle(shuffled);
  loadQuestion();
}

function updateCounter() {
  counterEl.textContent = `Frage ${index + 1} von ${shuffled.length}`;
}

function loadQuestion() {
  updateCounter();
  nextBtn.disabled = true;
  answersEl.innerHTML = "";
  resultEl.style.display = "none";

  const q = shuffled[index];
  questionEl.textContent = q.q;

  if (q.type === "mcq") {
    q.a.forEach((text, i) => {
      const label = document.createElement("label");
      const input = document.createElement("input");
      input.type = q.correct.length > 1 ? "checkbox" : "radio";
      input.name = "answer";
      input.onclick = () => checkAnswer(i, label);
      label.appendChild(input);
      label.appendChild(document.createTextNode(text));
      answersEl.appendChild(label);
    });
  } else if (q.type === "tf") {
    q.a.forEach((item, i) => {
      const div = document.createElement("div");
      div.className = "tf-row";
      div.innerHTML = `
        <button id="r${i}">R</button>
        <button id="f${i}" style="margin-left:5px;">F</button>
        <span>${item.text}</span>
      `;
      answersEl.appendChild(div);

      document.getElementById(`r${i}`).onclick = () => checkTF(i, true);
      document.getElementById(`f${i}`).onclick = () => checkTF(i, false);
    });
  }
}

function checkAnswer(i, label) {
  const q = shuffled[index];
  const input = label.querySelector("input");

  if (input.disabled) return;

  input.disabled = true;

  const isCorrect = q.correct.includes(i);
  if (isCorrect) score++;

  // show explanation only once
  if (!document.querySelector(".explain")) {
    const explain = document.createElement("div");
    explain.className = "explain";
    explain.textContent = q.explain;
    answersEl.appendChild(explain);
  }

  nextBtn.disabled = false;
}

function checkTF(i, choice) {
  const rBtn = document.getElementById(`r${i}`);
  const fBtn = document.getElementById(`f${i}`);
  rBtn.disabled = true;
  fBtn.disabled = true;

  const q = shuffled[index];
  const correct = q.a[i].correct;
  const isCorrect = (choice === correct);
  if (isCorrect) score++;

  if (!document.querySelector(".explain")) {
    const explain = document.createElement("div");
    explain.className = "explain";
    explain.textContent = q.explain;
    answersEl.appendChild(explain);
  }

  nextBtn.disabled = false;
}

nextBtn.onclick = () => {
  index++;
  if (index >= shuffled.length) {
    resultEl.style.display = "block";
    resultEl.textContent = `النتيجة: ${score} من ${shuffled.length}`;
    nextBtn.disabled = true;
  } else {
    loadQuestion();
  }
};

restartBtn.onclick = () => {
  startQuiz();
};

startQuiz();
</script>
</body>
</html>
