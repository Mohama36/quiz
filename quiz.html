<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار أنظمة 48 فولت - KFZ Expert</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        header {
            text-align: center;
            border-bottom: 3px solid var(--accent);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .setup-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background: #eee;
            padding: 20px;
            border-radius: 10px;
        }
        select, button {
            padding: 12px 25px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            cursor: pointer;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: var(--accent);
        }
        .question-card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-right: 6px solid var(--accent);
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .option-btn {
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            text-align: right;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover {
            background: #e9ecef;
        }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        #loader { text-align: center; display: none; margin: 20px; font-weight: bold; color: var(--primary); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>متخصص أنظمة الـ 48 فولت (KFZ)</h1>
        <p>توليد أسئلة ذكية بناءً على ملفات النظام الحديثة</p>
    </header>

    <div class="setup-section">
        <select id="difficulty">
            <option value="سهل">مستوى مبتدئ</option>
            <option value="متوسط" selected>مستوى فني (متوسط)</option>
            <option value="صعب">مستوى خبير (صعب)</option>
        </select>
        <button id="genBtn" onclick="generateExam()">توليد 25 سؤال عن نظام 48V</button>
    </div>

    <div id="loader">♻️ جاري فحص المستندات وتوليد الأسئلة...</div>
    <div id="quiz-area"></div>
</div>

<script>
    // المفتاح الذي استخرجته أنت من الصورة
    const API_KEY = 'AIzaSyAwnoyleWh2dA4ur8QWsy-GyYTcPqMlbbM'; 

    async function generateExam() {
        const diff = document.getElementById('difficulty').value;
        const quizArea = document.getElementById('quiz-area');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('genBtn');

        // تجهيز الواجهة
        quizArea.innerHTML = '';
        loader.style.display = 'block';
        btn.disabled = true;

        // "البرومبت" المخصص لملفك ونظام 48 فولت
        const prompt = `أنت خبير تقني في ميكانيكا السيارات الحديثة. 
        بناءً على تخصص (48 Volt System) في السيارات الهجينة، قم بتوليد 25 سؤال اختيار من متعدد باللغة العربية.
        المستوى المطلبو: ${diff}.
        ركز على: (المكونات، تحويل الجهد DC/DC، البطارية الليثيوم، بادئ الحركة المدمج RSG، والأمان التقني).
        يجب أن يكون الرد بصيغة JSON حصراً كقائمة كائنات بهذا الشكل:
        [{"q": "السؤال هنا؟", "options": ["خيار 1", "خيار 2", "خيار 3", "خيار 4"], "a": "الخيار الصحيح المطابق تماماً لواحد من القائمة"}]`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { response_mime_type: "application/json" }
                })
            });

            const data = await response.json();
            const questions = JSON.parse(data.candidates[0].content.parts[0].text);
            
            displayQuestions(questions);
        } catch (error) {
            console.error(error);
            alert('حدث خطأ! تأكد أنك تستخدم المتصفح من جهاز متصل بالإنترنت وأن المفتاح فعال.');
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }

    function displayQuestions(questions) {
        const quizArea = document.getElementById('quiz-area');
        questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <strong>سؤال ${index + 1}: ${item.q}</strong>
                <div class="options-grid">
                    ${item.options.map(opt => `
                        <div class="option-btn" onclick="checkAnswer(this, '${item.a.replace(/'/g, "\\'")}')">${opt}</div>
                    `).join('')}
                </div>
            `;
            quizArea.appendChild(card);
        });
    }

    function checkAnswer(element, correctAnswer) {
        const parent = element.parentElement;
        const options = parent.querySelectorAll('.option-btn');
        
        // منع الإجابة مرتين
        if (parent.classList.contains('answered')) return;
        parent.classList.add('answered');

        if (element.innerText.trim() === correctAnswer.trim()) {
            element.classList.add('correct');
        } else {
            element.classList.add('wrong');
            // إظهار الإجابة الصحيحة
            options.forEach(opt => {
                if (opt.innerText.trim() === correctAnswer.trim()) {
                    opt.classList.add('correct');
                }
            });
        }
    }
</script>

</body>
</html>
