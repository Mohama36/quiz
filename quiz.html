<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<style>
  body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
  .container { max-width: 900px; margin: 30px auto; background:white; padding:20px; border-radius:10px; display:flex; }
  .left { flex: 3; }
  .right { flex: 1; padding-left:20px; }
  .question { font-weight:bold; margin-top:20px; }
  .answers { margin-top:10px; }
  label { display:block; margin:6px 0; padding:8px; border:1px solid #ccc; border-radius:5px; cursor:pointer; }
  label.correct { background:#c8e6c9; border-color:#2e7d32; }
  label.wrong { background:#ffcdd2; border-color:#c62828; }
  .explain { margin-top:10px; background:#e3f2fd; padding:10px; border-radius:5px; }
  button { margin-top:20px; padding:10px 20px; border:none; background:#1976d2; color:white; border-radius:5px; cursor:pointer; }
  .counter { position:sticky; top:20px; background:#fff; border:1px solid #ccc; padding:15px; border-radius:10px; }
</style>
</head>
<body>

<div class="container">
  <div class="left">
    <div id="quiz"></div>
    <button id="nextBtn">التالي</button>
    <div id="result"></div>
  </div>

  <div class="right">
    <div class="counter">
      <h3>الأسئلة</h3>
      <p id="counterText">Frage 1 von 1</p>
      <p id="scoreText">النتيجة: 0</p>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    type: "mcq",
    q: "Das Gewinde eines Druckreglers einer Sauerstoffflasche ist schwergängig. Was tun?",
    a: ["Mit der Gewindefeile nacharbeiten", "Mit Fett einfetten", "Den Ausbilder informieren", "Rostlöser benutzen"],
    correct: [0, 2],
    explain: "Sicherheitsrelevant – niemals selbst reparieren. Informiere den Ausbilder."
  },
  {
    type: "mcq",
    q: "Aus welchen Materialien besteht Messing?",
    a: ["Kupfer und Stahl", "Zinn und Kupfer", "Kupfer und Zink", "Stahl und Aluminium"],
    correct: [2],
    explain: "Messing besteht aus Kupfer und Zink."
  },
  {
    type: "mcq",
    q: "Welches Gas verwenden wir beim Schutzgasschweißen?",
    a: ["Sauerstoff", "Argon", "CO2", "Azetylen"],
    correct: [1],
    explain: "Beim Schutzgasschweißen wird meist Argon verwendet."
  },
  {
    type: "mcq",
    q: "Was ist die Hauptaufgabe des Schutzgases?",
    a: ["Die Schweißstelle vor atmosphärischen Einflüssen schützen", "Schmutz von der Stelle wegpusten", "Für Erfrischung sorgen", "Brennbarkeit erhöhen"],
    correct: [0],
    explain: "Das Schutzgas schützt die Schweißstelle vor Oxidation."
  },
  {
    type: "mcq",
    q: "Welcher Bohrer wird für Gewinde M8 verwendet?",
    a: ["8,0 mm", "6,5 mm", "6,8 mm", "7,8 mm"],
    correct: [1],
    explain: "Für M8 wird ein 6,5 mm Kernloch gebohrt."
  },
  {
    type: "mcq",
    q: "Welches Werkzeug eignet sich zum Außengewindeschneiden?",
    a: ["Kluppe", "Kugelwindeisen", "Schneideisenhalter", "Radienlehre"],
    correct: [2],
    explain: "Mit dem Schneideisenhalter lässt sich das Gewinde schneiden."
  },
  {
    type: "mcq",
    q: "Die Klemmbezeichnung 58R an einer Anhängersteckdose steht für?",
    a: ["Bremsleuchte rechts", "Schlusslicht rechts", "Masse", "Blinker rechts"],
    correct: [1],
    explain: "58R = Schlusslicht rechts."
  },
  {
    type: "mcq",
    q: "Die Klemmbezeichnung 54 an einer Anhängersteckdose steht für?",
    a: ["Bremsleuchte", "Schlusslicht", "Blinker links", "Nebelschlussleuchte"],
    correct: [0],
    explain: "54 = Bremsleuchte."
  },
  {
    type: "mcq",
    q: "Welches Element treibt die Nockenwelle nicht an?",
    a: ["Zahnriemen", "Keilriemen", "Steuerkette", "Keilrippenriemen"],
    correct: [1],
    explain: "Ein Keilriemen treibt keine Nockenwelle an."
  },
  {
    type: "mcq",
    q: "Mit welchem Werkzeug prüft man den Verzug am Zylinderkopf?",
    a: ["Feinmessuhr", "Haarlineal", "Winkelmesser", "Parallelmaß"],
    correct: [1],
    explain: "Mit dem Haarlineal wird der Verzug geprüft."
  },
  {
    type: "mcq",
    q: "Welches Werkzeug zum genauen Messen einer Kurbelwelle?",
    a: ["Messschieber", "Innenfeinmessgerät", "Bügelmessschraube", "Refraktometer"],
    correct: [2],
    explain: "Die Bügelmessschraube ist ideal zum genauen Messen."
  },
  {
    type: "mcq",
    q: "Welche drei Winkel hat ein Ventil?",
    a: ["15°, 45°, 75°", "5°, 15°, 40°", "70°, 75°, 110°", "15°, 40°, 70°"],
    correct: [0],
    explain: "Standard-Ventilwinkel sind 15°, 45°, 75°."
  },
  {
    type: "mcq",
    q: "Wie breit sollte der Ventilsitz ungefähr sein?",
    a: ["1,8 cm", "1,5 mm", "4,2 cm", "2,0 mm"],
    correct: [1],
    explain: "Ein Ventilsitz ist ca. 1,5 mm breit."
  },
  {
    type: "mcq",
    q: "Welche Eigenschaft trifft auf einen Zahnriemen zu?",
    a: ["Formschlüssig", "Beständig gegen Feuchtigkeit", "Geringe Zugfestigkeit", "Kaum Längung"],
    correct: [0],
    explain: "Der Zahnriemen arbeitet formschlüssig."
  },
  {
    type: "mcq",
    q: "Welches Bauteil sorgt für die Rückstellung des Bremszylinderkolbens?",
    a: ["Staubmanschette", "Rechteckring", "Hauptbremszylinder", "Bremsscheibe"],
    correct: [1],
    explain: "Der Rechteckring sorgt für Rückstellung."
  },
  {
    type: "mcq",
    q: "Welche Fehler kann ein Kompressionstest zeigen?",
    a: ["Defekte Kurbelwelle", "Verbranntes Ventil", "Verschlissener Kolben", "Loch im Kolben"],
    correct: [1],
    explain: "Ein verbranntes Ventil zeigt typischerweise niedrige Kompression."
  },
  {
    type: "mcq",
    q: "Beim Druckverlusttest: Ursache bei 90 % Verlust?",
    a: ["Ventile falsch eingestellt", "Ventil verbrannt", "Kolben steht auf UT", "Öleinfüllstutzen geöffnet"],
    correct: [1],
    explain: "Ein verbranntes Ventil kann hohen Verlust erzeugen."
  },
  {
    type: "mcq",
    q: "Wie viele Nockenwellenumdrehungen beim Ventile einstellen (4-Zyl)?",
    a: ["0,5", "2", "1", "4"],
    correct: [1],
    explain: "Mindestens 2 Umdrehungen."
  },
  {
    type: "mcq",
    q: "Ein Arbeitsspiel eines 8-Zylinders besteht aus...?",
    a: ["360°", "180°", "720°", "90°"],
    correct: [2],
    explain: "Ein kompletter Zyklus ist 720°."
  },
  {
    type: "mcq",
    q: "Die Klemmbezeichnung 54g steht für?",
    a: ["Bremsleuchte", "Kennzeichenleuchte", "Nebelleuchte", "Rückfahrleuchte"],
    correct: [2],
    explain: "54g = Nebelleuchte."
  },
  {
    type: "mcq",
    q: "Hohlventile werden gefüllt mit?",
    a: ["Öl", "Messing", "Natrium", "Blei"],
    correct: [2],
    explain: "Natrium dient der Wärmeabfuhr."
  },
  {
    type: "mcq",
    q: "Kurbelwelle und Nockenwelle drehen sich im Verhältnis?",
    a: ["2:1", "1:1", "1:2", "3:1"],
    correct: [0],
    explain: "Die Nockenwelle dreht sich halb so oft wie die Kurbelwelle."
  },

  // أسئلة جديدة من عندك
  {
    type: "mcq",
    q: "Wie bereitest du eine Klebeverbindung fachgerecht vor (2)?",
    a: ["Du musst die Klebeflächen absolut eben schleifen.", "Du musst nichts vorbereiten, moderne Klebstoffe gleichen Unebenheiten und Verunreinigungen von selbst aus.", "Du musst die Klebeflächen metallisch blank schleifen oder die KTL-Grundierung des Ersatzteils anschleifen bzw. reinigen.", "Du musst punktschweistarbe oder Glasprime auftragen"],
    correct: [0, 2],
    explain: "Die Klebeflächen müssen sauber und eben sein, ggf. anschleifen."
  },
  {
    type: "mcq",
    q: "Was verstehst du unter der „Fügezeit\" eines Klebers (1)?",
    a: ["Die Zeit, innerhalb der der Kleber vollstandig aushartet.", "Die Zeit, nach der sich der Kleber verflüssigt, wenn er nicht in den Trocknungsofen kommt.", "Die Zeit, innerhalb der der Kleber mit Wasser benetzt werden muss.", "Die Zeit, innerhalb der alle Anpassarbeiten abgeschlossen sein müssen."],
    correct: [3],
    explain: "Fügezeit = Zeit für Anpassarbeiten bis der Kleber fixiert ist."
  },
  {
    type: "mcq",
    q: "Welche übergeordneten Material-eigenschaften müssen trotz Wärmezufuhr beim Fügen (Schweißen) von Karosserie-bauteilen erhalten bleiben (1)?",
    a: ["Korrosionsschutz und Flexibilitat", "Flexibilität und Magnetismus", "Festigkeit und Korrosionsschutz", "Lackierbarkeit und Rostfreiheit"],
    correct: [2],
    explain: "Wichtig ist Festigkeit + Korrosionsschutz."
  },
  {
    type: "mcq",
    q: "Wofür steht das „M\" in der Schrauben-bezeichnung M 12x x - -10.9 (1)?",
    a: ["Für Metallschraube.", "Für metrisches ISO-Gewinde.", "Für Mindestzugfestigkeit 12 Nm.", "Für maximales Drehmoment 120 Nm."],
    correct: [1],
    explain: "M = metrisches ISO-Gewinde."
  },
  {
    type: "mcq",
    q: "Welche zwei Werte werden verschlüsselt auf den Schraubenkopf aufgebracht (2)?",
    a: ["Die Streckgrenze", "Die Zugfestigkeit", "Die Gewindeart", "Die Gewindebezeichnung"],
    correct: [0, 1],
    explain: "Auf dem Schraubenkopf stehen Streckgrenze und Zugfestigkeit."
  },

  {
    type: "tf",
    q: "Es gibt verschiedene Varianten von Mess-schrauben. Entscheide, welche davon im Kfz-Bereich zum Einsatz kommen.",
    a: [
      { text: "Bügelmessschrauben", correct: true },
      { text: "Einbaumessschrauben", correct: false },
      { text: "Innenmessschrauben", correct: true },
      { text: "Tiefenmessschrauben", correct: false },
      { text: "Winkelmessschrauben", correct: false }
    ],
    explain: "Bügel- und Innenmessschrauben werden im KFZ-Bereich verwendet."
  },

  {
    type: "mcq",
    q: "Mit welcher Genauigkeit lassen sich Längenmaße mit dem Universalmessschieber ermitteln (2)?",
    a: ["0,1 Millimeter", "0,01 Millimeter", "0,001 Millimeter", "0,05 Millimeter"],
    correct: [0, 3],
    explain: "Der Messschieber hat typischerweise 0,1 mm oder 0,05 mm Genauigkeit."
  }
];

let index = 0;
let score = 0;
let answered = false;

const quizEl = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");
const resultEl = document.getElementById("result");
const counterText = document.getElementById("counterText");
const scoreText = document.getElementById("scoreText");

function updateCounter() {
  counterText.textContent = `Frage ${index + 1} von ${questions.length}`;
  scoreText.textContent = `النتيجة: ${score}`;
}

function showQuestion() {
  answered = false;
  quizEl.innerHTML = "";
  resultEl.innerHTML = "";
  updateCounter();

  const q = questions[index];

  const qEl = document.createElement("div");
  qEl.className = "question";
  qEl.innerHTML = `${q.q}`;
  quizEl.appendChild(qEl);

  const aEl = document.createElement("div");
  aEl.className = "answers";

  if (q.type === "mcq") {
    q.a.forEach((ans, i) => {
      const label = document.createElement("label");
      label.innerHTML = `
        <input type="radio" name="ans" value="${i}">
        ${ans}
      `;
      label.onclick = () => checkMCQ(i, label);
      aEl.appendChild(label);
    });
  }

  if (q.type === "tf") {
    q.a.forEach((item, i) => {
      const label = document.createElement("label");
      label.innerHTML = `
        <button style="margin-right:10px;" onclick="checkTF(${index}, ${i}, this)">R</button>
        <button onclick="checkTF(${index}, ${i}, this)">F</button>
        ${item.text}
      `;
      aEl.appendChild(label);
    });
  }

  quizEl.appendChild(aEl);
}

function checkMCQ(i, label) {
  if (answered) return;
  const q = questions[index];

  answered = true;

  const labels = quizEl.querySelectorAll("label");
  if (q.correct.length === 1) {
    if (i === q.correct[0]) {
      label.classList.add("correct");
      score++;
    } else {
      label.classList.add("wrong");
      labels[q.correct[0]].classList.add("correct");
    }
    showExplain(q.explain);
    return;
  }

  // multiple correct answers
  const inputs = quizEl.querySelectorAll("input");
  const chosen = [];
  inputs.forEach((inp, idx) => {
    if (inp.checked) chosen.push(idx);
  });

  if (chosen.length !== q.correct.length) {
    answered = false;
    return;
  }

  const isCorrect = chosen.every(v => q.correct.includes(v));
  if (isCorrect) score++;

  labels.forEach((l, idx) => {
    if (q.correct.includes(idx)) l.classList.add("correct");
    else if (chosen.includes(idx)) l.classList.add("wrong");
  });

  showExplain(q.explain);
}

function checkTF(qIndex, aIndex, btn) {
  const q = questions[qIndex];
  const parent = btn.parentElement.parentElement;
  const isRight = q.a[aIndex].correct;
  const isR = btn.textContent === "R";

  if ((isRight && isR) || (!isRight && !isR)) {
    score++;
    btn.style.background = "#c8e6c9";
  } else {
    btn.style.background = "#ffcdd2";
  }

  answered = true;
  showExplain(q.explain);
}

function showExplain(text) {
  const explainEl = document.createElement("div");
  explainEl.className = "explain";
  explainEl.textContent = text;
  quizEl.appendChild(explainEl);
}

nextBtn.onclick = () => {
  if (!answered) {
    alert("اختر جواباً أولاً");
    return;
  }

  index++;
  if (index >= questions.length) {
    quizEl.innerHTML = `<h2>النتيجة: ${score} من ${questions.length}</h2>`;
    nextBtn.style.display = "none";
    return;
  }
  showQuestion();
};

showQuestion();
</script>

</body>
</html>
