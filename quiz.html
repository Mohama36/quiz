function toggleLanguage() {
  currentLang = (currentLang === 'de') ? 'ar' : 'de';
  document.body.className = (currentLang === 'ar') ? 'ar' : '';
  renderUI();
  renderQuestion();
}

function renderUI() {
  const t = ui[currentLang];
  document.getElementById("langLabel").textContent = t.lang;
  document.getElementById("ui-title").textContent = t.title;
  document.getElementById("nextBtn").textContent = t.next;
  document.getElementById("ui-result-title").textContent = t.result;
  document.getElementById("restartBtn").textContent = t.restart;
}

function renderQuestion() {
  const q = questions[currentIndex];
  const t = ui[currentLang];
  const container = document.getElementById("answersContainer");
  const nextBtn = document.getElementById("nextBtn");
  
  document.getElementById("counter").textContent = `${t.q} ${currentIndex + 1} ${t.of} ${questions.length}`;
  document.getElementById("questionText").textContent = (currentLang === 'de' ? q.q_de : q.q_ar);
  
  let hint = "";
  if(q.type === 'single') hint = t.hintSingle;
  else if(q.type === 'multi') hint = t.hintMulti;
  else if(q.type === 'truth') hint = t.hintRF;
  document.getElementById("ui-hint").textContent = hint;

  container.innerHTML = "";
  nextBtn.style.display = "none";
  userSelections = [];

  const options = (currentLang === 'de' ? q.a_de : q.a_ar);

  options.forEach((optText, i) => {
    if (q.type === 'truth') {
      const row = document.createElement("div");
      row.className = "rf-row";
      row.innerHTML = `
        <div class="rf-text">${optText}</div>
        <div class="rf-options">
          <div class="rf-btn" id="r-${i}" onclick="handleRF(${i}, 'R')">R</div>
          <div class="rf-btn" id="f-${i}" onclick="handleRF(${i}, 'F')">F</div>
        </div>
      `;
      container.appendChild(row);
    } else {
      const label = document.createElement("label");
      label.className = "answer-item";
      const input = document.createElement("input");
      input.type = (q.type === 'single') ? "radio" : "checkbox";
      input.name = "ans";
      input.value = i;
      input.onchange = () => handleChoice();
      
      label.appendChild(input);
      label.appendChild(document.createTextNode(optText));
      container.appendChild(label);
    }
  });
}

function handleRF(rowIndex, choice) {
  userSelections[rowIndex] = choice;
  document.getElementById(`r-${rowIndex}`).classList.remove('selected-r');
  document.getElementById(`f-${rowIndex}`).classList.remove('selected-f');
  
  if(choice === 'R') document.getElementById(`r-${rowIndex}`).classList.add('selected-r');
  else document.getElementById(`f-${rowIndex}`).classList.add('selected-f');

  const q = questions[currentIndex];
  if(userSelections.filter(x => x).length === q.a_de.length) {
    validateRF();
  }
}

function validateRF() {
  const q = questions[currentIndex];
  let isAllCorrect = true;
  const rows = document.querySelectorAll('.rf-row');

  userSelections.forEach((choice, i) => {
    if(choice !== q.correct[i]) {
      isAllCorrect = false;
      rows[i].classList.add('wrong');
    } else {
      rows[i].classList.add('correct');
    }
    rows[i].classList.add('disabled');
  });

  if(isAllCorrect) score++;
  document.getElementById("nextBtn").style.display = "block";
}

function handleChoice() {
  const q = questions[currentIndex];
  const selected = Array.from(document.querySelectorAll('input:checked')).map(el => parseInt(el.value));

  if(q.type === 'single') validateChoice(selected);
  else if(q.type === 'multi' && selected.length === q.correct.length) validateChoice(selected);
}

function validateChoice(selected) {
  const q = questions[currentIndex];
  const items = document.querySelectorAll('.answer-item');
  const isCorrect = selected.length === q.correct.length && selected.every(v => q.correct.includes(v));
  if(isCorrect) score++;

  items.forEach((item, i) => {
    item.classList.add('disabled');
    if(q.correct.includes(i)) item.classList.add('correct');
    else if(selected.includes(i)) item.classList.add('wrong');
  });
  document.getElementById("nextBtn").style.display = "block";
}

function goToNext() {
  currentIndex++;
  if(currentIndex < questions.length) renderQuestion();
  else showResults();
}

function showResults() {
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("result-area").style.display = "block";
  const percent = Math.round((score/questions.length)*100);
  document.getElementById("scoreDisplay").textContent = `${score} / ${questions.length} (${percent}%)`;
}

function restartQuiz() {
  currentIndex = 0; score = 0;
  document.getElementById("quiz-area").style.display = "block";
  document.getElementById("result-area").style.display = "none";
  questions.sort(() => Math.random() - 0.5);
  renderQuestion();
}

questions.sort(() => Math.random() - 0.5);
renderUI();
renderQuestion();
</script>
</body>
</html>
