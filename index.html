<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technische Lernfragen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 20px auto;
      background: #fff;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 10px;
    }
    .question {
      font-size: 18px;
      margin-bottom: 15px;
    }
    .answers label {
      display: block;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .answers input {
      margin-right: 10px;
    }
    .correct {
      background-color: #d4edda;
      border-color: #28a745;
    }
    .wrong {
      background-color: #f8d7da;
      border-color: #dc3545;
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    #restartBtn {
      background: #28a745;
    }
    .tfRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .tfRow button {
      width: 50px;
      padding: 8px;
      font-size: 14px;
      margin-top: 0;
    }
    .tfRow span {
      font-size: 16px;
    }
    .explain {
      margin-top: 10px;
      font-weight: bold;
    }
    @media (max-width: 480px) {
      .container {
        margin: 10px;
        padding: 15px;
      }
      h1 {
        font-size: 18px;
      }
      .question {
        font-size: 17px;
      }
      button {
        width: 100%;
        margin-top: 8px;
      }
      .tfRow {
        flex-direction: column;
        align-items: flex-start;
      }
      .tfRow button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Technische Lernfragen</h1>
    <div id="counter" style="text-align:right;font-weight:bold;margin-bottom:10px;"></div>
    <div id="quiz">
      <div class="question" id="question"></div>
      <div class="answers" id="answers"></div>
      <button id="nextBtn" disabled>Nächste Frage</button>
      <button id="restartBtn">Neustart (neu mischen)</button>
    </div>
    <div id="result" style="display:none;"></div>
  </div>

  <script>
    const questions = [
      {
        q: "Das Gewinde eines Druckreglers einer Sauerstoffflasche ist schwergängig. Was tun?",
        a: ["Mit der Gewindefeile nacharbeiten","Mit Fett einfetten","Den Ausbilder informieren","Rostlöser benutzen"],
        correct: [0, 2],
        explain: "Bei sicherheitsrelevanten Bauteilen: Gewinde fachgerecht nacharbeiten und zusätzlich den Ausbilder informieren. Fett oder Rostlöser dürfen bei Sauerstoffanlagen nicht verwendet werden.",
        type: "mcq"
      },
      {
        q: "Aus welchen Materialien besteht Messing?",
        a: ["Kupfer und Stahl","Zinn und Kupfer","Kupfer und Zink","Stahl und Aluminium"],
        correct: [2],
        explain: "Messing besteht aus Kupfer und Zink.",
        type: "mcq"
      },
      {
        q: "Welches Gas verwenden wir beim Schutzgasschweißen?",
        a: ["Sauerstoff","Argon","CO2","Azetylen"],
        correct: [1],
        explain: "Beim Schutzgasschweißen wird meist Argon verwendet.",
        type: "mcq"
      },
      {
        q: "Was ist die Hauptaufgabe des Schutzgases?",
        a: ["Die Schweißstelle vor atmosphärischen Einflüssen schützen","Schmutz von der Stelle wegpusten","Für Erfrischung sorgen","Brennbarkeit erhöhen"],
        correct: [0],
        explain: "Das Schutzgas schützt die Schweißstelle vor Oxidation.",
        type: "mcq"
      },
      {
        q: "Welcher Bohrer wird für Gewinde M8 verwendet?",
        a: ["8,0 mm","6,5 mm","6,8 mm","7,8 mm"],
        correct: [1],
        explain: "Für M8 wird ein 6,5 mm Kernloch gebohrt.",
        type: "mcq"
      },
      {
        q: "Welches Werkzeug eignet sich zum Außengewindeschneiden?",
        a: ["Kluppe","Kugelwindeisen","Schneideisenhalter","Radienlehre"],
        correct: [2],
        explain: "Mit dem Schneideisenhalter lässt sich das Gewinde schneiden.",
        type: "mcq"
      },
      {
        q: "Die Klemmbezeichnung 58R an einer Anhängersteckdose steht für?",
        a: ["Bremsleuchte rechts","Schlusslicht rechts","Masse","Blinker rechts"],
        correct: [1],
        explain: "58R = Schlusslicht rechts.",
        type: "mcq"
      },
      {
        q: "Die Klemmbezeichnung 54 an einer Anhängersteckdose steht für?",
        a: ["Bremsleuchte","Schlusslicht","Blinker links","Nebelschlussleuchte"],
        correct: [0],
        explain: "54 = Bremsleuchte.",
        type: "mcq"
      },
      {
        q: "Welches Element treibt die Nockenwelle nicht an?",
        a: ["Zahnriemen","Keilriemen","Steuerkette","Keilrippenriemen"],
        correct: [1],
        explain: "Ein Keilriemen treibt keine Nockenwelle an.",
        type: "mcq"
      },
      {
        q: "Mit welchem Werkzeug prüft man den Verzug am Zylinderkopf?",
        a: ["Feinmessuhr","Haarlineal","Winkelmesser","Parallelmaß"],
        correct: [1],
        explain: "Mit dem Haarlineal wird der Verzug geprüft.",
        type: "mcq"
      },
      {
        q: "Welches Werkzeug zum genauen Messen einer Kurbelwelle?",
        a: ["Messschieber","Innenfeinmessgerät","Bügelmessschraube","Refraktometer"],
        correct: [2],
        explain: "Die Bügelmessschraube ist ideal zum genauen Messen.",
        type: "mcq"
      },
      {
        q: "Welche drei Winkel hat ein Ventil?",
        a: ["15°, 45°, 75°","5°, 15°, 40°","70°, 75°, 110°","15°, 40°, 70°"],
        correct: [0],
        explain: "Standard-Ventilwinkel sind 15°, 45°, 75°.",
        type: "mcq"
      },
      {
        q: "Wie breit sollte der Ventilsitz ungefähr sein?",
        a: ["1,8 cm","1,5 mm","4,2 cm","2,0 mm"],
        correct: [1],
        explain: "Ein Ventilsitz ist ca. 1,5 mm breit.",
        type: "mcq"
      },
      {
        q: "Welche Eigenschaft trifft auf einen Zahnriemen zu?",
        a: ["Formschlüssig","Beständig gegen Feuchtigkeit","Geringe Zugfestigkeit","Kaum Längung"],
        correct: [0],
        explain: "Der Zahnriemen arbeitet formschlüssig.",
        type: "mcq"
      },
      {
        q: "Welches Bauteil sorgt für die Rückstellung des Bremszylinderkolbens?",
        a: ["Staubmanschette","Rechteckring","Hauptbremszylinder","Bremsscheibe"],
        correct: [1],
        explain: "Der Rechteckring sorgt für Rückstellung.",
        type: "mcq"
      },
      {
        q: "Welche Fehler kann ein Kompressionstest zeigen?",
        a: ["Defekte Kurbelwelle","Verbranntes Ventil","Verschlissener Kolben","Loch im Kolben"],
        correct: [1,2,3],
        explain: "Ein verbranntes Ventil, verschlissener Kolben/Zylinder oder ein Loch im Kolben zeigen sich durch niedrige Kompression.",
        type: "mcq"
      },
      {
        q: "Beim Druckverlusttest: Ursache bei 90% Verlust?",
        a: ["Ventile falsch eingestellt","Ventil verbrannt","Kolben steht auf UT","Öleinfüllstutzen geöffnet"],
        correct: [1],
        explain: "Ein verbranntes Ventil kann hohen Druckverlust erzeugen.",
        type: "mcq"
      },
      {
        q: "Wie viele Nockenwellenumdrehungen beim Ventile einstellen (4-Zyl)?",
        a: ["0,5","2","1","4"],
        correct: [1],
        explain: "Mindestens 2 Umdrehungen.",
        type: "mcq"
      },
      {
        q: "Ein Arbeitsspiel eines 8-Zylinders besteht aus...?",
        a: ["360°","180°","720°","90°"],
        correct: [2],
        explain: "Ein kompletter Zyklus ist 720°.",
        type: "mcq"
      },
      {
        q: "Die Klemmbezeichnung 54g steht für?",
        a: ["Bremsleuchte","Kennzeichenleuchte","Nebelleuchte","Rückfahrleuchte"],
        correct: [2],
        explain: "54g = Nebelleuchte.",
        type: "mcq"
      },
      {
        q: "Hohlventile werden gefüllt mit?",
        a: ["Öl","Messing","Natrium","Blei"],
        correct: [2],
        explain: "Natrium dient der Wärmeabfuhr.",
        type: "mcq"
      },
      {
        q: "Kurbelwelle und Nockenwelle drehen sich im Verhältnis?",
        a: ["2:1","1:1","1:2","3:1"],
        correct: [0],
        explain: "Die Nockenwelle dreht sich halb so oft wie die Kurbelwelle.",
        type: "mcq"
      },
      // ======= New Questions =======
      {
        q: "Wie bereitest du eine Klebeverbindung fachgerecht vor?",
        a: [
          { text: "Du musst die Klebeflächen absolut eben schleifen.", correct: true },
          { text: "Du musst nichts vorbereiten, moderne Klebstoffe gleichen Unebenheiten und Verunreinigungen von selbst aus.", correct: false },
          { text: "Du musst die Klebeflächen metallisch blank schleifen oder die KTL-Grundierung des Ersatzteils anschleifen bzw. reinigen.", correct: true },
          { text: "Du musst punktschweistarbe oder Glasprime auftragen", correct: false }
        ],
        explain: "Die Klebeflächen müssen sauber und richtig angeschliffen werden.",
        type: "tf"
      },
      {
        q: "Was verstehst du unter der „Fügezeit“ eines Klebers?",
        a: [
          { text: "Die Zeit, innerhalb der der Kleber vollständig aushärtet.", correct: false },
          { text: "Die Zeit, nach der sich der Kleber verflüssigt, wenn er nicht in den Trocknungsofen kommt.", correct: false },
          { text: "Die Zeit, innerhalb der der Kleber mit Wasser benetzt werden muss.", correct: false },
          { text: "Die Zeit, innerhalb der alle Anpassarbeiten abgeschlossen sein müssen.", correct: true }
        ],
        explain: "Fügezeit = Zeit, bis alle Teile fixiert und angepasst sein müssen.",
        type: "tf"
      },
      {
        q: "Welche übergeordneten Materialeigenschaften müssen trotz Wärmezufuhr beim Fügen (Schweißen) von Karosseriebauteilen erhalten bleiben?",
        a: [
          { text: "Korrosionsschutz und Flexibilität", correct: false },
          { text: "Flexibilität und Magnetismus", correct: false },
          { text: "Festigkeit und Korrosionsschutz", correct: true },
          { text: "Lackierbarkeit und Rostfreiheit", correct: false }
        ],
        explain: "Festigkeit und Korrosionsschutz müssen erhalten bleiben.",
        type: "tf"
      },
      {
        q: "Wofür steht das „M“ in der Schraubenbezeichnung M12x...-10.9?",
        a: [
          { text: "Für Metallschraube.", correct: false },
          { text: "Für metrisches ISO-Gewinde.", correct: true },
          { text: "Für Mindestzugfestigkeit 12 Nm.", correct: false },
          { text: "Für maximales Drehmoment 120 Nm.", correct: false }
        ],
        explain: "M steht für metrisches ISO-Gewinde.",
        type: "tf"
      },
      {
        q: "Welche zwei Werte werden auf dem Schraubenkopf verschlüsselt aufgebracht?",
        a: [
          { text: "Die Streckgrenze", correct: true },
          { text: "Die Zugfestigkeit.", correct: true },
          { text: "Die Gewindeart.", correct: false },
          { text: "Die Gewindebezeichnung.", correct: false }
        ],
        explain: "Auf dem Kopf stehen Streckgrenze und Zugfestigkeit.",
        type: "tf"
      },
      {
        q: "Es gibt verschiedene Varianten von Messschrauben. Entscheide, welche davon im Kfz-Bereich zum Einsatz kommen.",
        a: [
          { text: "Bügelmessschrauben", correct: true },
          { text: "Einbaumessschrauben", correct: false },
          { text: "Innenmessschrauben", correct: true },
          { text: "Tiefenmessschrauben", correct: false },
          { text: "Winkelmessschrauben", correct: false }
        ],
        explain: "Bügel- und Innenmessschrauben werden im KFZ-Bereich verwendet.",
        type: "tf"
      },
      {
        q: "Mit welcher Genauigkeit lassen sich Längenmaße mit dem Universalmessschieber ermitteln?",
        a: [
          { text: "0,1 Millimeter", correct: true },
          { text: "0,01 Millimeter", correct: false },
          { text: "0,001 Millimeter", correct: false },
          { text: "0,05 Millimeter", correct: true }
        ],
        explain: "Messschieber messen mit 0,1 mm und 0,05 mm Genauigkeit.",
        type: "tf"
      }
    ];

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function shuffleQuiz() {
      shuffleArray(questions);
      questions.forEach(q => {
        if (q.type === "mcq") {
          const pairs = q.a.map((text, idx) => ({ text, idx }));
          shuffleArray(pairs);
          q.a = pairs.map(p => p.text);
          const newCorrect = [];
          pairs.forEach((p, newIdx) => {
            if (q.correct.includes(p.idx)) newCorrect.push(newIdx);
          });
          q.correct = newCorrect;
        } else {
          shuffleArray(q.a);
        }
      });
    }

    shuffleQuiz();

    let index = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const resultEl = document.getElementById("result");
    const quizEl = document.getElementById("quiz");

    function loadQuestion() {
      document.getElementById("counter").textContent = `Frage ${index + 1} von ${questions.length}`;
      nextBtn.disabled = true;
      answersEl.innerHTML = "";
      const q = questions[index];
      questionEl.textContent = q.q;

      if (q.type === "mcq") {
        q.a.forEach((text, i) => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = q.correct.length > 1 ? "checkbox" : "radio";
          input.name = "answer";
          input.onclick = () => checkAnswer(i, label);
          label.appendChild(input);
          label.appendChild(document.createTextNode(text));
          answersEl.appendChild(label);
        });
      } else {
        q.a.forEach((item, i) => {
          const div = document.createElement("div");
          div.className = "tfRow";
          div.innerHTML = `
            <button id="r${i}">R</button>
            <button id="f${i}">F</button>
            <span>${item.text}</span>
          `;
          answersEl.appendChild(div);

          document.getElementById(`r${i}`).onclick = () => checkTF(i, true);
          document.getElementById(`f${i}`).onclick = () => checkTF(i, false);
        });
      }
    }

    function checkTF(i, choice) {
      const q = questions[index];
      const rBtn = document.getElementById(`r${i}`);
      const fBtn = document.getElementById(`f${i}`);
      rBtn.disabled = true;
      fBtn.disabled = true;

      const correct = q.a[i].correct;
      const isCorrect = (choice === correct);
      if (isCorrect) score++;

      // prevent repeated explanation
      if (!document.querySelector(".explain")) {
        const explain = document.createElement("div");
        explain.className = "explain";
        explain.textContent = q.explain;
        answersEl.appendChild(explain);
      }

      nextBtn.disabled = false;
    }

    function checkAnswer(selected, label) {
      const q = questions[index];
      const labels = answersEl.querySelectorAll("label");
      const inputs = answersEl.querySelectorAll("input");

      if (q.correct.length > 1) {
        let chosen = [];
        inputs.forEach((inp, i) => { if (inp.checked) chosen.push(i); });
        if (chosen.length < q.correct.length) return;
        const isCorrect = chosen.length === q.correct.length && chosen.every(v => q.correct.includes(v));
        labels.forEach((l, i) => {
          if (q.correct.includes(i)) l.classList.add("correct");
          else if (chosen.includes(i)) l.classList.add("wrong");
        });
        if (isCorrect) score++;
      } else {
        if (selected === q.correct[0]) {
          label.classList.add("correct");
          score++;
        } else {
          label.classList.add("wrong");
          labels[q.correct[0]].classList.add("correct");
        }
      }

      if (!document.querySelector(".explain")) {
        const explain = document.createElement("div");
        explain.className = "explain";
        explain.textContent = "Erklärung: " + q.explain;
        answersEl.appendChild(explain);
      }

      nextBtn.disabled = false;
    }

    nextBtn.onclick = () => {
      index++;
      if (index < questions.length) {
        loadQuestion();
      } else {
        quizEl.style.display = "none";
        resultEl.style.display = "block";
        resultEl.innerHTML = `<h2>Ergebnis</h2><p>${score} von ${questions.length} richtig</p>`;
      }
    };

    restartBtn.onclick = () => {
      index = 0;
      score = 0;
      resultEl.style.display = "none";
      quizEl.style.display = "block";
      shuffleQuiz();
      loadQuestion();
    };

    loadQuestion();
  </script>
</body>
</html>
