<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technische Lernfragen - Final</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { text-align: center; color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 15px; }
    #counter { text-align: right; font-weight: bold; color: #5f6368; margin-bottom: 20px; }
    .question { font-size: 20px; margin-bottom: 25px; color: #202124; line-height: 1.5; font-weight: 600; }
    .multi-hint { font-size: 14px; color: #1a73e8; font-weight: normal; margin-left: 10px; }
    .answers { display: flex; flex-direction: column; gap: 12px; }
    .answers label { display: block; padding: 15px; border: 2px solid #dadce0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 17px; position: relative; }
    .answers label:hover { background-color: #f8f9fa; border-color: #bdc1c6; }
    .answers input { margin-right: 15px; transform: scale(1.3); }
    
    /* الألوان */
    .correct { background-color: #e6f4ea !important; border-color: #34a853 !important; color: #137333; pointer-events: none; }
    .wrong { background-color: #fce8e6 !important; border-color: #ea4335 !important; color: #c5221f; pointer-events: none; }
    .selected { border-color: #1a73e8; background-color: #e8f0fe; }
    .disabled { pointer-events: none; }

    #nextBtn { display: none; width: 100%; margin-top: 25px; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    #nextBtn:hover { background: #1765cc; }
    #restartBtn { width: 100%; margin-top: 20px; padding: 15px; background: #34a853; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    #result-summary { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Technische Lernfragen</h1>
  <div id="counter"></div>
  <div id="quiz-box">
    <div class="question" id="question"></div>
    <div class="answers" id="answers"></div>
    <button id="nextBtn">Nächste Frage</button>
  </div>
  <div id="result-area" style="display:none;">
    <div id="result-summary"></div>
    <button id="restartBtn">Test neu starten</button>
  </div>
</div>

<script>
const questions = [
  { q: "Welche Arten von Schrauben gibt es?", a: ["Holzschrauben", "Maschinenschrauben", "Blechschrauben", "Alle oben"], correct: [3] },
  { q: "Was ist eine Mutter?", a: ["Ein Werkzeug", "Ein Schraubenteil mit Innengewinde", "Ein Messgerät", "Ein Schmiermittel"], correct: [1] },
  { q: "Wofür steht die Abkürzung DIN?", a: ["Deutsches Institut für Normung", "Deutsche Industrie Norm", "Deutsche Ingenieur Norm", "Deutsche Institut Norm"], correct: [0] },
  { q: "Welche Schraube ist für Metall geeignet?", a: ["Holzschraube", "Blechschraube", "Betonschraube", "Nagel"], correct: [1] },
  { q: "Was bedeutet die Bezeichnung M8?", a: ["8 mm Durchmesser", "8 cm Länge", "8 mm Länge", "8 Zoll"], correct: [0] },
  { q: "Was ist ein Drehmoment?", a: ["Kraft mal Weg", "Drehkraft", "Temperatur", "Geschwindigkeit"], correct: [1] },
  { q: "Welche Einheit hat das Drehmoment?", a: ["Nm", "m/s", "kg", "W"], correct: [0] },
  { q: "Was ist eine Schraubensicherung?", a: ["Ein Werkzeug", "Ein Mittel gegen Lösen", "Eine Schraube", "Ein Messgerät"], correct: [1] },
  { q: "Welche Sicherung ist für hohe Vibration geeignet?", a: ["Loctite", "Federring", "Unterlegscheibe", "Kleber"], correct: [1] },
  { q: "Was ist ein Federring?", a: ["Ein Gummiring", "Ein Metallring mit Federwirkung", "Ein Kunststoffring", "Ein Dichtungsring"], correct: [1] },
  { q: "Welche Funktion hat eine Unterlegscheibe?", a: ["Schützt das Material", "Erhöht das Drehmoment", "Verringert die Kraft", "Erhöht die Geschwindigkeit"], correct: [0] },
  { q: "Welche Schraube hat ein metrisches Gewinde?", a: ["M-Schraube", "UNC-Schraube", "BSW-Schraube", "NPT-Schraube"], correct: [0] },
  { q: "Was bedeutet 'Gewindesteigung'?", a: ["Abstand zwischen Gewindegängen", "Durchmesser", "Länge", "Härte"], correct: [0] },
  { q: "Was ist eine Mutter mit Sicherungsring?", a: ["Sicherungsmutter", "Kronenmutter", "Kontermutter", "Flügelmutter"], correct: [0] },
  { q: "Welche Schraube wird für Holz verwendet?", a: ["Blechschraube", "Holzschraube", "Maschinenschraube", "Betonschraube"], correct: [1] },
  { q: "Was ist eine Maschinenschraube?", a: ["Schraube für Maschinengewinde", "Schraube für Holz", "Schraube für Beton", "Schraube für Kunststoff"], correct: [0] },
  { q: "Was ist eine Blechschraube?", a: ["Schraube für Holz", "Schraube für Metallbleche", "Schraube für Beton", "Schraube für Kunststoff"], correct: [1] },
  { q: "Wofür steht die Abkürzung SAE?", a: ["Society of Automotive Engineers", "Standard Automotive Engineering", "System Automotive Engineering", "Standard Auto Equipment"], correct: [0] },
  { q: "Was beschreibt die SAE-Klasse eines Öls?", a: ["Viskosität", "Farbe", "Geruch", "Preis"], correct: [0] },
  { q: "Was ist ein O-Ring?", a: ["Ein Metallring", "Ein Gummidichtungsring", "Ein Kunststoffring", "Ein Schraubenteil"], correct: [1] },
  { q: "Wofür steht 'ATF'?", a: ["Automatic Transmission Fluid", "Auto Tire Fluid", "Anti Freeze", "Air Tank Fluid"], correct: [0] },
  { q: "Was bedeutet 'TÜV'?", a: ["Technischer Überwachungsverein", "Technische Überwachungsorganisation", "Technischer Überwachungsdienst", "Technische Überwachung"], correct: [0] },
  { q: "Was ist ein Profilindikator?", a: ["Ein Messgerät für Reifenprofil", "Ein Ölfilter", "Ein Bremsbelag", "Ein Zündkerze"], correct: [0] },
  { q: "Wofür steht 'TWI'?", a: ["Tread Wear Indicator", "Tire Wear Index", "Tire Width Indicator", "Tread Width Index"], correct: [0] },
  { q: "Was passiert bei zu niedrigem Reifendruck?", a: ["Abnutzung in der Mitte", "Abnutzung an den Schultern", "Keine Abnutzung", "Reifen platzt sofort"], correct: [1] },
  { q: "Welche Funktion hat die Bremse?", a: ["Beschleunigen", "Bremsen", "Lenken", "Hupen"], correct: [1] },
  { q: "Was ist ein Bremssattel?", a: ["Teil der Bremse", "Teil des Motors", "Teil des Getriebes", "Teil der Karosserie"], correct: [0] },
  { q: "Was bedeutet 'hygroskopisch' bei Bremsflüssigkeit?", a: ["Zieht Wasser an", "Ist wasserdicht", "Ist brennbar", "Ist farblos"], correct: [0] },
  { q: "Wie sehen Reifen aus, die مع zu hohem Luftdruck gefahren worden sind?", a: ["Gleichmäßige Abnutzung", "Abnutzung in der Reifenmitte", "Abnutzung an der Reifeninnenschulter", "Abnutzung an der Reifenaußenschulter"], correct: [1] },
  { q: "Was bedeutet die Geschwindigkeitsklasse H beim PKW Reifen?", a: ["190 km/h", "200 km/h", "210 km/h", "220 km/h"], correct: [2] },
  { q: "Was ist ein Abriebindikator TWI?", a: ["Erhebung am Profilgrund", "Bremsstreifen", "Nachschneidbares Profil", "Flüssigkeit zur Alterserkennung"], correct: [0] },
  { q: "Welchen Vorteil hat die Scheibenbremse gegenüber der Trommelbremse?", a: ["Bremsbacken geschützt", "Kein Abrieb auf Felge", "Günstiger", "Weniger empfindlich gegen Reibwertschwankungen"], correct: [3] },
  { q: "In welchem Abstand und warum Bremsflüssigkeit wechseln?", a: ["Alle 2 Jahre wegen Farbe", "Alle 3 Jahre", "Alle 2 Jahre, hygroskopisch", "Bei jeder Inspektion"], correct: [2] },
  { q: "Auswirkung unterschiedlich dicker Bremsscheiben?", a: ["Vibrationen", "Keine", "Mehr Bremskraft", "Längerer Pedalweg"], correct: [0] },
  { q: "Temperatur von Motoröl bei Betriebstemperatur?", a: ["50–100 °C", "80–150 °C", "150–250 °C", "50–250 °C"], correct: [1] },
  { q: "Was ist Eloxieren?", a: ["Salzsäurebad", "Zinkschicht", "Chemische Oxidation", "Elektrolytische Oxidation von Aluminium"], correct: [3] },
  { q: "Kennzeichnung von Automatikgetriebeöl?", a: ["ASU", "SAE", "ATF", "API"], correct: [2] },
  { q: "SAE 10W-40 bezieht sich auf?", a: ["Viskosität", "Menge", "Qualität", "Motorräder"], correct: [0] },
  { q: "Batteriesäure auf der Hand – was tun?", a: ["Nichts", "Mit viel Wasser abwaschen", "Verbinden", "Abwischen"], correct: [1] },
  { q: "Auswirkung eines verschmutzten Luftfilters?", a: ["Mehr Leistung", "Mehr Luft", "Schnellere Luft", "Weniger Luftdurchsatz"], correct: [3] },
  { q: "Wie bereitest du eine Klebeverbindung fachgerecht vor?", a: ["Klebeflächen absolut eben schleifen", "Nichts vorbereiten", "Klebeflächen metallisch blank schleifen oder KTL anschleifen", "Glasprime auftragen"], correct: [2] },
  { q: "Was verstehst du unter der „Fügezeit\" eines Klebers?", a: ["Zeit bis zur Aushärtung", "Zeit nach der Verflüssigung", "Zeit der Benetzung", "Zeit innerhalb der alle Anpassarbeiten abgeschlossen sein müssen"], correct: [3] },
  { q: "Welche Eigenschaften müssen beim Schweißen erhalten bleiben?", a: ["Korrosionsschutz und Flexibilität", "Flexibilität und Magnetismus", "Festigkeit und Korrosionsschutz", "Lackierbarkeit und Rostfreiheit"], correct: [0] },
  { q: "Wofür steht das „M\" in M 12x 70 -- 10.9?", a: ["Metallschraube", "Metrisches ISO-Gewinde", "Mindestzugfestigkeit", "Maximales Drehmoment"], correct: [1] },
  { q: "Welche zwei Werte werden auf den Schraubenkopf aufgebracht?", a: ["Die Streckgrenze", "Die Zugfestigkeit", "Die Gewindeart", "Die Gewindebezeichnung"], correct: [0, 1] },
  { q: "Welche Messschrauben kommen im Kfz-Bereich zum Einsatz?", a: ["Bügelmessschrauben", "Einbaumessschrauben", "Innenmessschrauben", "Tiefenmessschrauben"], correct: [0, 2, 3] },
  { q: "Genauigkeit eines Universalmessschiebers?", a: ["0,1 Millimeter", "0,01 Millimeter", "0,001 Millimeter", "0,05 Millimeter"], correct: [0, 3] },
  { q: "Arten der Zinkbeschichtung für Karosseriebleche?", a: ["Legierungsverzinkung", "Pulververzinkung", "Elektrolytische Verzinkung", "Feuerverzinkung"], correct: [0, 2, 3] },
  { q: "Was beachten bei Karosserie-Hohlraumschutz?", a: ["Keine wachsähnlichen Mittel", "Innenverkleidung abbauen", "Material das auf Zink haftet", "Keine neuen Löcher bohren"], correct: [2, 3] },
  { q: "Eigenschaft von CNG Kraftstoff?", a: ["5-8 bar Druck", "Druck von etwa 200 bar in speziellen Stahltanks", "Flüssig bei 5 bar", "Beigas bei Benzinherstellung"], correct: [1] },
  { q: "Was bedeutet bivalenter Betrieb?", a: ["Autogas und Erdgas", "Propan und Butan", "Gaskraftstoff und Benzin", "Benzin und Diesel"], correct: [2] },
  { q: "Energiegehalt von Autogas?", a: ["Gleich wie 1L Benzin", "Gleich wie 1kg Erdgas", "Halber Inhalt wie 1kg Erdgas", "Halber Inhalt wie 1L Benzin"], correct: [1] },
  { q: "Ohmsches Gesetz für Innenwiderstand?", a: ["U = R x I", "R = U : I", "P = U : I", "R = U x I"], correct: [1] },
  { q: "Kälteprüfstrom einer Batterie mit ETN ...068?", a: ["588 Ampere", "380 Ampere", "680 Ampere", "880 Ampere"], correct: [2] },
  { q: "Was legt die Zifferngruppe B fest?", a: ["Kälteprüfstrom", "Rüttelfestigkeit", "Gehäusematerial", "Zyklenfestigkeit"], correct: [0] }
];

let currentIndex = 0;
let score = 0;
let isAnswered = false;

function loadQuestion() {
  isAnswered = false;
  const currentQ = questions[currentIndex];
  document.getElementById("counter").textContent = `Frage ${currentIndex + 1} von ${questions.length}`;
  
  // إضافة تنبيه لعدد الإجابات المطلوبة
  let hint = currentQ.correct.length > 1 ? `<span class="multi-hint">(Wähle ${currentQ.correct.length})</span>` : "";
  document.getElementById("question").innerHTML = currentQ.q + hint;
  
  const aEl = document.getElementById("answers");
  aEl.innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";

  const inputType = currentQ.correct.length > 1 ? "checkbox" : "radio";

  currentQ.a.forEach((text, i) => {
    const label = document.createElement("label");
    const input = document.createElement("input");
    input.type = inputType;
    input.name = "answer";
    input.value = i;
    
    input.onchange = () => handleSelection(inputType);

    label.appendChild(input);
    label.appendChild(document.createTextNode(text));
    aEl.appendChild(label);
  });
}

function handleSelection(type) {
  if (isAnswered) return;
  
  const currentQ = questions[currentIndex];
  const selected = document.querySelectorAll('input:checked');
  const selectedIndices = Array.from(selected).map(inp => parseInt(inp.value));

  // تمييز التصميم عند الاختيار
  document.querySelectorAll('.answers label').forEach(l => l.classList.remove('selected'));
  selected.forEach(inp => inp.parentElement.classList.add('selected'));

  // منطق التصحيح
  if (type === "radio") {
    // تصحيح فوري للخيار الواحد
    validate(selectedIndices);
  } else {
    // انتظار اختيار كافة الإجابات المطلوبة في الخيارات المتعددة
    if (selectedIndices.length === currentQ.correct.length) {
      validate(selectedIndices);
    }
  }
}

function validate(selectedIndices) {
  isAnswered = true;
  const currentQ = questions[currentIndex];
  const labels = document.querySelectorAll('.answers label');
  const inputs = document.querySelectorAll('.answers input');

  const isCorrect = selectedIndices.length === currentQ.correct.length && 
                    selectedIndices.every(val => currentQ.correct.includes(val));

  if (isCorrect) score++;

  labels.forEach((label, idx) => {
    label.classList.add('disabled');
    if (currentQ.correct.includes(idx)) {
      label.classList.add('correct');
    } else if (selectedIndices.includes(idx)) {
      label.classList.add('wrong');
    }
  });

  document.getElementById("nextBtn").style.display = "block";
}

document.getElementById("nextBtn").onclick = () => {
  currentIndex++;
  if (currentIndex < questions.length) {
    loadQuestion();
  } else {
    showResults();
  }
};

function showResults() {
  document.getElementById("quiz-box").style.display = "none";
  document.getElementById("result-area").style.display = "block";
  document.getElementById("result-summary").textContent = `Ergebnis: ${score} von ${questions.length} richtig! (${Math.round(score/questions.length*100)}%)`;
}

document.getElementById("restartBtn").onclick = () => {
  currentIndex = 0; score = 0;
  questions.sort(() => Math.random() - 0.5);
  document.getElementById("quiz-box").style.display = "block";
  document.getElementById("result-area").style.display = "none";
  loadQuestion();
};

questions.sort(() => Math.random() - 0.5);
loadQuestion();
</script>
</body>
</html>
