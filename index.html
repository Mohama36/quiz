<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFZ 48V Exam - النسخة الصاروخية</title>
    <style>
        :root { --primary: #1a73e8; --accent: #34a853; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 20px; margin-top: 15px; border-radius: 8px; border-right: 6px solid var(--accent); text-align: right; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .opt-btn { display: block; width: 100%; text-align: right; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 6px; cursor: pointer; background: #fff; font-size: 15px; transition: 0.2s; }
        .opt-btn:hover { background: #f1f3f4; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        button#genBtn { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 18px; cursor: pointer; font-weight: bold; }
        button#genBtn:disabled { background: #ccc; }
        #status { margin: 15px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>اختبار أنظمة 48V (KFZ) 🚗</h1>
        <p>هذه النسخة تعمل في ألمانيا 100% لجميع الرفاق</p>
    </div>
    
    <div id="status">جاهز للعمل.. اضغط لتوليد 25 سؤالاً</div>
    <button id="genBtn" onclick="generateExam()">توليد الأسئلة الآن (بسرعة Groq)</button>
    <div id="quiz-area"></div>
</div>

<script>
    // مفتاح Groq الخاص بك الذي أرسلته
    const API_KEY = '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'; 

    async function generateExam() {
        const quizArea = document.getElementById('quiz-area');
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        quizArea.innerHTML = '';
        status.innerText = '⌛ جاري توليد الأسئلة... (سريع جداً)';
        status.style.color = "blue";
        btn.disabled = true;

        const prompt = `أنت خبير ميكانيكا سيارات ألماني. قم بتوليد 25 سؤالاً اختيار من متعدد (MCQ) باللغة العربية حول نظام الـ 48 فولت في السيارات الحديثة. 
        يجب أن يكون الرد بصيغة JSON نظيفة فقط، عبارة عن قائمة كائنات:
        [{"q": "السؤال؟", "options": ["أ", "ب", "ج", "د"], "a": "الإجابة الصحيحة"}]`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            let content = data.choices[0].message.content;
            
            // تنظيف النص في حال وجود علامات ```
            const cleanJson = content.replace(/```json/g, '').replace(/```/g, '').trim();
            const questions = JSON.parse(cleanJson);

            status.innerText = '✅ تم التوليد بنجاح! بالتوفيق يا شباب.';
            status.style.color = "green";
            
            questions.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <strong>س ${index + 1}: ${item.q}</strong>
                    <div style="margin-top:10px;">
                        ${item.options.map(opt => `
                            <button class="opt-btn" onclick="check(this,'${item.a.replace(/'/g, "\\'")}')">${opt}</button>
                        `).join('')}
                    </div>`;
                quizArea.appendChild(card);
            });

        } catch (e) {
            status.innerText = "❌ حدث خطأ في الاتصال. حاول مرة أخرى.";
            status.style.color = "red";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    function check(btn, correct) {
        const parent = btn.parentElement;
        if (parent.dataset.answered === "true") return;
        parent.dataset.answered = "true";

        if (btn.innerText.trim() === correct.trim()) { 
            btn.classList.add('correct'); 
        } else { 
            btn.classList.add('wrong');
            const btns = parent.querySelectorAll('.opt-btn');
            btns.forEach(b => {
                if (b.innerText.trim() === correct.trim()) b.classList.add('correct');
            });
        }
    }
</script>
</body>
</html>
