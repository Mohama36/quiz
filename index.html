<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technische Lernfragen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 20px auto;
      background: #fff;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 10px;
    }
    .question {
      font-size: 18px;
      margin-bottom: 15px;
    }
    .answers label {
      display: block;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .answers input {
      margin-right: 10px;
    }
    .correct {
      background-color: #cce7ff;
      border-color: #0099ff;
    }
    .wrong {
      background-color: #f8d7da;
      border-color: #dc3545;
    }

    .answers div button {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #007bff;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }

    .answers div.correct button {
      background-color: #28a745 !important;
      border-color: #28a745 !important;
      color: #fff;
    }
    .answers div.wrong button {
      background-color: #dc3545 !important;
      border-color: #dc3545 !important;
      color: #fff;
    }

    .rf-btn-correct {
      background-color: #28a745 !important;
      border-color: #28a745 !important;
      color: #fff !important;
    }
    .rf-btn-wrong {
      background-color: #dc3545 !important;
      border-color: #dc3545 !important;
      color: #fff !important;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    #restartBtn {
      background: #28a745;
    }
    @media (max-width: 480px) {
      .container {
        margin: 10px;
        padding: 15px;
      }
      h1 {
        font-size: 18px;
      }
      .question {
        font-size: 17px;
      }
      button {
        width: 100%;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Technische Lernfragen</h1>

      <div class="question" id="question"></div>
      <div class="answers" id="answers"></div>
      <button id="nextBtn" disabled>Nächste Frage</button>
      <button id="restartBtn">Neustart (neu mischen)</button>
    </div>
    <div id="result" style="display:none;"></div>
  </div>

    // --- Clean brackets from answers (if user added [ ] around correct options) ---
    function cleanQuestionData() {
      questions.forEach(q => {
        if (q.type === 'mcq' && Array.isArray(q.a)) {
          q.a = q.a.map(t => (typeof t === 'string' ? t.replace(/\[|\]/g, '').trim() : t));
        }
        if (q.type === 'rf' && Array.isArray(q.a)) {
          q.a.forEach(item => {
            if (item && typeof item.text === 'string') {
              item.text = item.text.replace(/\[|\]/g, '').trim();
            }
          });
        }
      });
    }

    // --- Auto-detect RF questions by phrase in the question text ---
    function autoDetectRF() {
      const rfPhrase = 'Setze (R) für richtig und (F) für falsch ein';
      questions.forEach(q => {
        if (typeof q.q === 'string' && q.q.includes(rfPhrase)) {
          q.type = 'rf';
        }
      });
    }

    cleanQuestionData();
    autoDetectRF();

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function shuffleQuiz() {
      shuffleArray(questions);
      questions.forEach(q => {
        if (q.type === 'mcq') {
          const pairs = q.a.map((text, idx) => ({ text, idx }));
          shuffleArray(pairs);
          q.a = pairs.map(p => p.text);
          const newCorrect = [];
          pairs.forEach((p, newIdx) => {
            if (q.correct.includes(p.idx)) newCorrect.push(newIdx);
          });
          q.correct = newCorrect;
        }
      });
    }

    // Compute total steps (questions count)
    function totalSteps() {
      return questions.length;
    }

    let score = 0;

    const answersEl = document.getElementById('answers');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const resultEl = document.getElementById('result');
    const quizEl = document.getElementById('quiz');

    function updateCounter() {
      document.getElementById('counter').textContent = `Frage ${index + 1} von ${totalSteps()}`;
    }

    function loadQuestion() {
      updateCounter();
      nextBtn.disabled = true;
      answersEl.innerHTML = '';

      const q = questions[index];
      questionEl.textContent = q.q;

      if (q.type === 'mcq') {
        q.a.forEach((text, i) => {
          const label = document.createElement('label');
          const input = document.createElement('input');
          input.type = q.correct.length > 1 ? 'checkbox' : 'radio';
          input.name = 'answer';
          input.onclick = () => checkMCQ(i, label);
          label.appendChild(input);
          label.appendChild(document.createTextNode(text));
          answersEl.appendChild(label);
        });
      } else if (q.type === 'rf') {
        q.a.forEach((item, i) => {
          const div = document.createElement('div');
          div.style.marginBottom = '8px';
          const btnR = document.createElement('button');
          const btnF = document.createElement('button');

          btnR.textContent = 'R';
          btnF.textContent = 'F';

          btnR.style.marginRight = '10px';
          btnF.style.marginRight = '10px';

          btnR.onclick = () => checkRF(i, true, div);
          btnF.onclick = () => checkRF(i, false, div);

          const span = document.createElement('span');
          span.textContent = item.text;

          div.appendChild(btnR);
          div.appendChild(btnF);
          div.appendChild(span);
          answersEl.appendChild(div);
        });

        // RF: enable next only after all statements answered
        q._answeredCount = 0;
        q._totalCount = q.a.length;
      }
    }

    function checkMCQ(selected, label) {
      const q = questions[index];
      const labels = answersEl.querySelectorAll('label');
      const inputs = answersEl.querySelectorAll('input');

      if (q.correct.length > 1) {
        const chosen = [];
        inputs.forEach((inp, i) => { if (inp.checked) chosen.push(i); });
        if (chosen.length < q.correct.length) return;

        const isCorrect = chosen.length === q.correct.length && chosen.every(v => q.correct.includes(v));
        labels.forEach((l, i) => {
          if (q.correct.includes(i)) l.classList.add('correct');
          else if (chosen.includes(i)) l.classList.add('wrong');
        });

        if (isCorrect) score++;
      } else {
        if (selected === q.correct[0]) {
          label.classList.add('correct');
          score++;
        } else {
          label.classList.add('wrong');
          labels[q.correct[0]].classList.add('correct');
        }
      }

      nextBtn.disabled = false;
    }

    function checkRF(i, choice, div) {
      const q = questions[index];
      const item = q.a[i];

      if (div.dataset.done) return;
      div.dataset.done = 'true';

      const correct = item.correct === choice;
      if (correct) div.classList.add('correct');
      else div.classList.add('wrong');

      const buttons = Array.from(div.querySelectorAll('button'));
      const btnClicked = choice ? buttons[0] : buttons[1];

      if (correct) {
        btnClicked.classList.add('rf-btn-correct');
        score++;
      } else {
        btnClicked.classList.add('rf-btn-wrong');
        const correctBtn = item.correct ? buttons[0] : buttons[1];
        if (correctBtn) correctBtn.classList.add('rf-btn-correct');
      }

      buttons.forEach(b => b.disabled = true);

      q._answeredCount = (q._answeredCount || 0) + 1;
      if (q._answeredCount >= q._totalCount) {
        nextBtn.disabled = false;
      }
    }

    nextBtn.onclick = () => {
      index++;
      if (index < questions.length) {
        loadQuestion();
      } else {
        quizEl.style.display = 'none';
        resultEl.style.display = 'block';
        resultEl.innerHTML = `<h2>Ergebnis</h2><p>${score} von ${questions.length} richtig</p>`;
      }
    };

    restartBtn.onclick = () => {
      index = 0;
      score = 0;
      resultEl.style.display = 'none';
      quizEl.style.display = 'block';
      shuffleQuiz();
      loadQuestion();
    };

    shuffleQuiz();
    loadQuestion();
  </script>
</body>
</html>
