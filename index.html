<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kfz-Technik Academy Pro</title>
  <style>
    :root { 
      --primary: #1a73e8; --success: #34a853; --error: #ea4335; 
      --bg: #f8f9fa; --card: #ffffff; --text: #202124; --secondary: #5f6368;
    }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; }
    body.ar { direction: rtl; }
    .container { max-width: 650px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; margin-bottom: 20px; border-bottom: 2px solid #eee; }
    .logo { font-weight: 900; font-size: 22px; color: var(--primary); letter-spacing: 1px; }
    .btn-lang { background: var(--card); border: 1.5px solid #dadce0; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .screen { display: none; animation: fadeIn 0.4s ease; }
    .active { display: block; }
    .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; position: relative; }
    .exit-top-link { position: absolute; top: 15px; right: 20px; color: var(--secondary); font-size: 13px; font-weight: bold; cursor: pointer; text-decoration: underline; z-index: 10; }
    body.ar .exit-top-link { right: auto; left: 20px; }
    h1 { font-size: 24px; text-align: center; margin: 0 0 10px 0; }
    .subtitle { text-align: center; color: var(--secondary); margin-bottom: 30px; font-size: 15px; line-height: 1.4; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .category-btn { background: #fff; border: 2px solid #f0f2f5; padding: 18px 10px; border-radius: 15px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .category-btn:hover { border-color: var(--primary); transform: translateY(-3px); }
    .mode-btn { border: none; margin-top: 10px; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; color: white; width: 100%; }
    .training-btn { background: #5f6368; }
    .exam-btn { background: var(--primary); }
    #counter { font-size: 14px; color: var(--secondary); margin-bottom: 12px; font-weight: bold; }
    .question-text { font-size: 20px; font-weight: 700; margin-top: 15px; margin-bottom: 25px; line-height: 1.5; color: #111; }
    .hint { font-size: 12px; color: var(--primary); background: #e8f0fe; padding: 6px 12px; border-radius: 8px; margin-bottom: 10px; display: inline-block; font-weight: bold; }
    .answers-list { display: flex; flex-direction: column; gap: 12px; }
    .answer-item { display: flex; align-items: center; padding: 18px; border: 2px solid #f0f2f5; border-radius: 15px; cursor: pointer; font-size: 16px; transition: 0.2s; }
    .answer-item:hover { border-color: var(--primary); background: #f8faff; }
    .answer-item input { margin: 0 15px; width: 20px; height: 20px; }
    .rf-row { padding: 15px; border: 2px solid #f0f2f5; border-radius: 15px; margin-bottom: 12px; background: #fafafa; }
    .rf-options { display: flex; gap: 12px; margin-top: 12px; justify-content: flex-end; }
    .rf-btn { width: 60px; height: 50px; border: 2px solid #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; background: #fff; font-size: 18px; }
    .selected-r { background: var(--success) !important; color: white; border-color: var(--success) !important; }
    .selected-f { background: var(--error) !important; color: white; border-color: var(--error) !important; }
    .correct { background: #e6f4ea !important; border-color: var(--success) !important; color: #137333; font-weight: bold; }
    .wrong { background: #fce8e6 !important; border-color: var(--error) !important; color: #c5221f; }
    .disabled { pointer-events: none; opacity: 0.7; }
    .nav-btns { margin-top: 30px; }
    .main-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
    .primary-btn { background: var(--primary); color: white; }
    .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 10px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 800; margin: 30px auto; color: var(--primary); background: #fff; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

</head>

      <div class="nav-btns">
        <button id="nextBtn" class="main-btn primary-btn" onclick="goToNext()" style="display: none;"></button>
      </div>
    </div>
  </div>

  <div id="result-screen" class="screen">
    <div class="card" style="text-align: center;">

      <div id="scoreDisplay" class="score-circle"></div>

  </div>

  { cat: 'motor', q_de: "Funktion des Generators?", q_ar: "وظيفة المولد (الدينامو) في السيارة؟", type: "single", a_de: ["Energie", "mech. zu elektr.", "Zündung", "Räder"], a_ar: ["طاقة", "ميكانيك لكهرباء", "إشعال", "عجلات"], correct: [1] },
  { cat: 'flüssig', q_de: "Frostschutz Nebenaufgabe?", q_ar: "ما هي وظيفة مضاد التجمد الإضافية؟", type: "single", a_de: ["Korrosionsschutz", "Öl", "Bremse", "Batterie"], a_ar: ["الصدأ", "الزيت", "الفرامل", "البطارية"], correct: [0] },
  { cat: 'elektro', q_de: "Welche Klemme am Generator geht zur Batterie?", q_ar: "أي مربط في المولد يذهب للبطارية؟", type: "single", a_de: ["31", "B+ (30)", "61", "DF"], a_ar: ["31", "B+ (30)", "61", "DF"], correct: [1] }
];

function toggleLanguage() {
  currentLang = (currentLang === 'de') ? 'ar' : 'de';
  document.body.className = (currentLang === 'ar') ? 'ar' : '';
  renderDashboard();
  renderUI();
  if (document.getElementById("quiz-screen").classList.contains("active")) renderQuestion(true); 
}

function renderDashboard() {
  const menu = document.getElementById("categoryMenu");
  const cats = categories[currentLang];
  menu.innerHTML = "";
  Object.keys(cats).forEach(key => {
    const btn = document.createElement("button");
    btn.className = "category-btn";
    btn.textContent = cats[key];
    btn.onclick = () => startQuiz(key, false);
    menu.appendChild(btn);
  });
}

function renderUI() {
  const t = ui[currentLang];
  document.getElementById("langBtn").textContent = t.lang;
  document.getElementById("ui-welcome").textContent = t.welcome;
  document.getElementById("ui-sub").textContent = t.sub;
  document.getElementById("ui-train-all-btn").textContent = t.trainAll;
  document.getElementById("ui-exam-btn").textContent = t.exam;
  document.getElementById("ui-restart").textContent = t.restart;
  document.getElementById("ui-result-title").textContent = t.result;
  document.getElementById("ui-exit").textContent = t.exit;
}

function startQuiz(catKey, fullExamBlind) {
  isExamMode = fullExamBlind;
  score = 0;
  currentIndex = 0;
  if (catKey === 'all') {
    quizQuestions = [...allQuestions].sort(() => Math.random() - 0.5);
  } else {
    quizQuestions = allQuestions.filter(q => q.cat === catKey).sort(() => Math.random() - 0.5);
  }
  showScreen("quiz-screen");
  renderQuestion();
}

function renderQuestion(keepSelections = false) {
  const q = quizQuestions[currentIndex];
  const t = ui[currentLang];
  const container = document.getElementById("answersContainer");
  const nextBtn = document.getElementById("nextBtn");
  document.getElementById("counter").innerHTML = `<span>${t.q} ${currentIndex + 1} / ${quizQuestions.length}</span>`;
  document.getElementById("questionText").textContent = (currentLang === 'de' ? q.q_de : q.q_ar);
  document.getElementById("ui-hint").textContent = (q.type==='single'?t.hintSingle : q.type==='multi'?t.hintMulti : t.hintRF);
  container.innerHTML = "";
  if (!keepSelections) { nextBtn.style.display = "none"; userSelections = []; }
  const options = (currentLang === 'de' ? q.a_de : q.a_ar);
  options.forEach((optText, i) => {
    if (q.type === 'truth') {
      const row = document.createElement("div");
      row.className = "rf-row";
      row.innerHTML = `<div>${optText}</div><div class="rf-options"><div class="rf-btn" id="r-${i}" onclick="handleRF(${i}, 'R')">R</div><div class="rf-btn" id="f-${i}" onclick="handleRF(${i}, 'F')">F</div></div>`;
      container.appendChild(row);
    } else {
      const label = document.createElement("label");
      label.className = "answer-item";
      label.innerHTML = `<input type="${q.type==='single'?'radio':'checkbox'}" name="ans" value="${i}" onchange="handleInput()"> ${optText}`;
      container.appendChild(label);
    }
  });
}

function handleInput() {
  const q = quizQuestions[currentIndex];
  const selected = Array.from(document.querySelectorAll('input:checked')).map(el => parseInt(el.value));
  if (isExamMode) {
    document.getElementById("nextBtn").style.display = "block";
    document.getElementById("nextBtn").textContent = ui[currentLang].next;
  } else {
    if(q.type === 'single') validateChoice(selected);
    else if(q.type === 'multi' && selected.length === q.correct.length) validateChoice(selected);
  }
}

function handleRF(rowIndex, choice) {
  userSelections[rowIndex] = choice;
  document.getElementById(`r-${rowIndex}`).classList.remove('selected-r');
  document.getElementById(`f-${rowIndex}`).classList.remove('selected-f');
  if(choice === 'R') document.getElementById(`r-${rowIndex}`).classList.add('selected-r');
  else document.getElementById(`f-${rowIndex}`).classList.add('selected-f');
  if(userSelections.filter(x => x).length === quizQuestions[currentIndex].a_de.length) {
    if(isExamMode) {
        document.getElementById("nextBtn").style.display = "block";
        document.getElementById("nextBtn").textContent = ui[currentLang].next;
    } else validateRF();
  }
}

function validateChoice(selected) {
  const q = quizQuestions[currentIndex];
  const isCorrect = selected.length === q.correct.length && selected.every(v => q.correct.includes(v));
  if(isCorrect) score++;
  document.querySelectorAll('.answer-item').forEach((item, i) => {
    item.classList.add('disabled');
    if(q.correct.includes(i)) item.classList.add('correct');
    else if(selected.includes(i)) item.classList.add('wrong');
  });
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("nextBtn").textContent = ui[currentLang].next;
}

function validateRF() {
  const q = quizQuestions[currentIndex];
  let allCorrect = true;
  userSelections.forEach((choice, i) => {
    const row = document.querySelectorAll('.rf-row')[i];
    if(choice !== q.correct[i]) { allCorrect = false; row.classList.add('wrong'); }
    else row.classList.add('correct');
    row.classList.add('disabled');
  });
  if(allCorrect) score++;
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("nextBtn").textContent = ui[currentLang].next;
}

function goToNext() {
  if (isExamMode) calculateExamScore();
  currentIndex++;
  if(currentIndex < quizQuestions.length) renderQuestion();
  else showResults();
}

function calculateExamScore() {
  const q = quizQuestions[currentIndex];
  if(q.type === 'truth') {
    if(userSelections.every((choice, i) => choice === q.correct[i])) score++;
  } else {
    const selected = Array.from(document.querySelectorAll('input:checked')).map(el => parseInt(el.value));
    if(selected.length === q.correct.length && selected.every(v => q.correct.includes(v))) score++;
  }
}

function showResults() {
  showScreen("result-screen");
  document.getElementById("scoreDisplay").textContent = `${score}/${quizQuestions.length}`;
  const percent = Math.round((score/quizQuestions.length)*100);
  document.getElementById("ui-feedback").textContent = percent > 50 ? (currentLang==='ar'?"أداء ممتاز!":"Tolle Leistung!") : (currentLang==='ar'?"حاول مرة أخرى!":"Noch mal üben!");
}

function exitToHome() { showScreen("home-screen"); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

renderDashboard();
renderUI();
</script>
</body>
</html>
